<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertas Vecinales</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  /* Mockup tipo teléfono con espacio amplio */
  .phone-mockup {
    background: white;
    border: 14px solid #111;
    border-radius: 40px;
    width: 360px;
    max-width: 90vw;
    padding: 40px 20px 60px 20px; /* más espacio arriba y abajo */
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header y Footer */
  .header {
    height: 100px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 1.4em;
    margin-bottom: 20px;
  }

  .footer {
    height: 220px;
    width: 100%;
    margin-top: 20px;
    background: #f5f5f5;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1em;
    color: #333;
  }

  .app-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .btn {
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    color: white;
    cursor: pointer;
    border: none;
    outline: none;
    user-select: none;
  }

  /* Botón EMERGENCIA */
  .btn-emergencia {
    background: #e53935;
    height: 130px;
    width: 100%;
    border-radius: 12px 12px 0 0;
    margin-bottom: 6px;
    font-size: 1.3em;
    text-align: center;
  }

  /* Segunda fila */
  .row-middle {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 6px;
  }

  .btn-square {
    background: #3949ab;
    height: 90px;
    width: 48%;
    border-radius: 0;
    font-size: 1em;
  }

  /* Tercera fila */
  .btn-estado {
    background: #00897b;
    height: 70px;
    width: 100%;
    border-radius: 0 0 12px 12px;
    font-size: 1em;
  }

  /* Hover */
  .btn:hover {
    opacity: 0.85;
  }

</style>
</head>
<body>
  <div class="phone-mockup">
    <div class="header">🏘️ Villa Ejemplo</div>
    <div class="app-container">
      <button class="btn btn-emergencia">🚨 EMERGENCIA</button>
      <div class="row-middle">
        <button class="btn btn-square">CARABINEROS</button>
        <button class="btn btn-square">SEGURIDAD CIUDADANA</button>
      </div>
      <button class="btn btn-estado">ESTADO</button>
    </div>
    <div class="footer">📍 Ubicación | 🔔 Notificaciones</div>
  </div>
</body>
</html>
