<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerta Emergencia PRO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121226;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 30px;
      min-height: 100vh;
    }

    #btnEmergencia {
      position: relative;
      background: #ff3b3b;
      border: none;
      color: #fff;
      padding: 20px 40px;
      font-size: 24px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    #btnEmergencia:hover { transform: scale(1.05); }

    #badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #ffd500;
      color: #000;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 16px;
      animation: pop 0.3s;
    }
    @keyframes pop { 0% {transform: scale(0);} 70% {transform: scale(1.2);} 100% {transform: scale(1);} }

    #alertas {
      margin-top: 30px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 500px;
      overflow-y: auto;
    }

    .alerta {
      background: #1e1e2f;
      border-left: 5px solid #ff3b3b;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    .alerta button {
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    #btnBorrarTodo {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background-color: #5555ff;
      color: #fff;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    #btnBorrarTodo:hover { transform: scale(1.05); }
  </style>
</head>
<body>

  <button id="btnEmergencia">
    🚨 Emergencia
    <div id="badge">0</div>
  </button>

  <button id="btnBorrarTodo">🗑️ Borrar todas las alertas</button>

  <div id="alertas"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-messaging.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT_ID.firebaseapp.com",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_PROJECT_ID.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID",
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);
    const db = getFirestore(app);

    const alertasContainer = document.getElementById("alertas");
    const badge = document.getElementById("badge");
    let contador = 0;

    // Datos del usuario (pueden venir de sesión o formulario)
    const usuario = {
      nombre: "Juan García",
      casa: "123",
      ubicacion: { lat: -33.45, lng: -70.65 } // GPS real
    };

    // Registrar token en backend
    async function registrarToken() {
      try {
        const token = await getToken(messaging, { vapidKey: "TU_VAPID_KEY" });
        if (token) {
          console.log("Token registrado:", token);
          await fetch("https://TU_BACKEND.onrender.com/registrar-token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
          });
        }
      } catch (err) { console.error("Error registrando token:", err); }
    }
    registrarToken();

    // Escuchar notificaciones push
    onMessage(messaging, (payload) => {
      console.log("Mensaje recibido:", payload);
      agregarAlerta(payload.notification.body);
    });

    // Escuchar alertas en Firestore
    const q = query(collection(db, "alertas"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
      alertasContainer.innerHTML = "";
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        agregarAlerta(data.mensaje, docSnap.id, false);
      });
    });

    function agregarAlerta(mensaje, id=null, incrementar=true) {
      const div = document.createElement("div");
      div.classList.add("alerta");
      div.innerHTML = `<span>${mensaje}</span><button>&times;</button>`;
      alertasContainer.prepend(div);

      const btnBorrar = div.querySelector("button");
      if (id) btnBorrar.addEventListener("click", () => eliminarAlerta(id));

      if (incrementar) {
        contador++;
        badge.textContent = contador;
      }
    }

    async function eliminarAlerta(id) {
      try { await deleteDoc(doc(db, "alertas", id)); }
      catch (err) { console.error("Error borrando alerta:", err); }
    }

    // Botón de emergencia
    document.getElementById("btnEmergencia").addEventListener("click", async () => {
      try {
        await fetch("https://TU_BACKEND.onrender.com/emergencia", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario })
        });
        console.log("Alerta enviada al backend");
      } catch (err) { console.error("Error enviando alerta:", err); }
    });

    // Botón borrar todas las alertas
    const btnBorrarTodo = document.getElementById("btnBorrarTodo");
    btnBorrarTodo.addEventListener("click", async () => {
      if (!confirm("¿Seguro quieres borrar todas las alertas?")) return;

      try {
        const querySnapshot = await getDocs(collection(db, "alertas"));
        const borrados = [];
        querySnapshot.forEach((docSnap) => {
          borrados.push(deleteDoc(doc(db, "alertas", docSnap.id)));
        });
        await Promise.all(borrados);

        alertasContainer.innerHTML = "";
        contador = 0;
        badge.textContent = contador;
        console.log("✅ Todas las alertas borradas");
      } catch (err) {
        console.error("❌ Error borrando alertas:", err);
      }
    });
  </script>
</body>
</html>
