<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App de Alertas Vecinales</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f6fa; display:flex; justify-content:center; align-items:flex-start; height:100vh; }
.container { display:flex; flex-direction:row; width:90%; max-width:1000px; margin-top:40px; gap:20px; }
.left-panel { flex:1; display:flex; flex-direction:column; align-items:center; gap:20px; }
.btn-emergencia { background:#e74c3c; color:white; font-size:2rem; font-weight:bold; border:none; border-radius:20px; padding:30px 60px; cursor:pointer; transition:0.2s all; }
.btn-emergencia:hover { background:#c0392b; transform:scale(1.05); }
.btn-group { display:flex; flex-direction:column; gap:15px; width:80%; }
.btn-group button { padding:15px; font-size:1rem; border-radius:10px; border:none; cursor:pointer; transition:0.2s all; color:white; }
#btnCarabineros { background:#2980b9; }
#btnSeguridad { background:#27ae60; }
#btnEstado { background:#95a5a6; }
.right-panel { flex:1; background:#fff; border-radius:15px; box-shadow:0px 5px 15px rgba(0,0,0,0.1); padding:20px; max-height:600px; overflow-y:auto; }
.alert { background:#f1c40f; color:#2c3e50; padding:12px; border-radius:10px; margin-bottom:10px; transition:0.2s all; }
.alert.new { background:#e74c3c; color:white; animation:flash 1s; }
@keyframes flash { 0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);} }
h2 { margin-top:0; font-size:1.5rem; text-align:center; }
</style>
</head>
<body>
<div class="container">
  <div class="left-panel">
    <button class="btn-emergencia" id="btnEmergencia">🚨 EMERGENCIA</button>
    <div class="btn-group">
      <button id="btnCarabineros">Carabineros</button>
      <button id="btnSeguridad">Seguridad Ciudadana</button>
      <button id="btnEstado">Estado</button>
    </div>
  </div>
  <div class="right-panel">
    <h2>Alertas recientes</h2>
    <div id="alertContainer"></div>
  </div>
</div>

<script>
const alertContainer = document.getElementById('alertContainer');

// Función para agregar alerta al panel
function addAlert(text, isNew=false) {
  const div = document.createElement('div');
  div.className = 'alert' + (isNew ? ' new' : '');
  div.textContent = text;
  alertContainer.prepend(div);
}

// Función para enviar alerta al backend
async function enviarAlerta(usuario, tipo) {
  try {
    const response = await fetch('https://TU_BACKEND.onrender.com/emergencia', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        usuario,
        token: null // o un token específico si es necesario
      })
    });
    const data = await response.json();
    if(data.success){
      addAlert(`${tipo} enviada con éxito`, tipo==='🚨 Emergencia');
    } else {
      addAlert(`Error al enviar ${tipo}: ${data.error}`);
    }
  } catch(err){
    addAlert(`Error al enviar ${tipo}: ${err.message}`);
  }
}

// Datos de ejemplo del usuario
const usuarioEjemplo = {
  nombre: "Juan",
  casa: "12",
  ubicacion: { lat: -33.45, lng: -70.65 }
};

// Eventos de los botones
document.getElementById('btnEmergencia').addEventListener('click', () => enviarAlerta(usuarioEjemplo,'🚨 Emergencia'));
document.getElementById('btnCarabineros').addEventListener('click', () => enviarAlerta(usuarioEjemplo,'🟦 Carabineros'));
document.getElementById('btnSeguridad').addEventListener('click', () => enviarAlerta(usuarioEjemplo,'🟩 Seguridad Ciudadana'));
document.getElementById('btnEstado').addEventListener('click', () => addAlert('ℹ️ Estado del sistema: Todo normal'));
</script>
</body>
</html>
