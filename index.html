<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertas Vecinales - Mockup 3D</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#b3cde0,#f0f2f5);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.mockup-phone {
  width: 360px;
  height: 720px;
  background: #111;
  border-radius: 50px;
  padding: 15px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  position: relative;
  transform: rotateX(5deg) rotateY(-5deg);
}
.screen {
  flex: 1;
  background: linear-gradient(180deg,#e3e7ed,#f9fafc);
  border-radius: 30px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
}
h2 { text-align: center; color: #34495e; margin-top: 0; }
.btn-main {
  background: #e74c3c;
  color: white;
  font-size: 1.8rem;
  font-weight: bold;
  border: none;
  border-radius: 25px;
  padding: 25px;
  cursor: pointer;
  margin-bottom: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  transition: 0.2s all;
}
.btn-main:hover { background: #c0392b; transform: scale(1.05); }
.btn-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
.btn-group button {
  padding: 15px;
  font-size: 1.1rem;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
  transition: 0.2s all;
}
#btnCarabineros { background: #2980b9; }
#btnSeguridad { background: #27ae60; }
#btnEstado { background: #95a5a6; }
.alert-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 10px; padding-bottom: 10px; }
.alert { padding: 12px; border-radius: 15px; color: #2c3e50; background: #f1c40f; display: flex; align-items: center; gap: 8px; transition: 0.2s all; }
.alert.new { background: #e74c3c; color:white; animation:flash 1s; }
@keyframes flash { 0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);} }
</style>
</head>
<body>

<div class="mockup-phone">
  <div class="screen">
    <h2>Alertas Vecinales</h2>
    <button class="btn-main" id="btnEmergencia"><i class="fas fa-bell"></i> EMERGENCIA</button>
    <div class="btn-group">
      <button id="btnCarabineros"><i class="fas fa-shield-alt"></i> Carabineros</button>
      <button id="btnSeguridad"><i class="fas fa-user-shield"></i> Seguridad Ciudadana</button>
      <button id="btnEstado"><i class="fas fa-info-circle"></i> Estado</button>
    </div>
    <div class="alert-container" id="alertContainer"></div>
  </div>
</div>

<script>
const alertContainer = document.getElementById('alertContainer');

// Datos del usuario de ejemplo, puedes reemplazarlo dinámicamente
const usuarioEjemplo = { nombre: "Juan", casa: "12", ubicacion: { lat:-33.45, lng:-70.65 } };

function addAlert(text, isNew=false) {
  const div = document.createElement('div');
  div.className = 'alert' + (isNew ? ' new' : '');
  div.innerHTML = text;
  alertContainer.prepend(div);
}

async function enviarAlerta(tipo) {
  try {
    const response = await fetch('https://alertas-rosko.onrender.com/emergencia', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario: usuarioEjemplo, token: null })
    });
    const data = await response.json();
    if(data.success) addAlert(`✅ ${tipo} enviada a todos los vecinos`, tipo==='🚨 EMERGENCIA');
    else addAlert(`❌ Error enviando ${tipo}: ${data.error}`);
  } catch(err){
    addAlert(`❌ Error enviando ${tipo}: ${err.message}`);
  }
}

document.getElementById('btnEmergencia').addEventListener('click', ()=>enviarAlerta('🚨 EMERGENCIA'));
document.getElementById('btnCarabineros').addEventListener('click', ()=>enviarAlerta('🟦 Carabineros'));
document.getElementById('btnSeguridad').addEventListener('click', ()=>enviarAlerta('🟩 Seguridad Ciudadana'));
document.getElementById('btnEstado').addEventListener('click', ()=>addAlert('ℹ️ Estado del sistema: Todo normal'));
</script>

</body>
</html>
