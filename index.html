<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botón de Emergencia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1e1e2f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    /* Botón de emergencia */
    #btnEmergencia {
      position: relative;
      background: #ff3b3b;
      border: none;
      color: #fff;
      padding: 20px 40px;
      font-size: 24px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    #btnEmergencia:hover {
      transform: scale(1.05);
    }

    /* Badge contador */
    #badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #ffd500;
      color: #000;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 16px;
      animation: pop 0.3s;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Lista de alertas */
    #alertas {
      margin-top: 40px;
      width: 300px;
      max-height: 400px;
      overflow-y: auto;
    }

    .alerta {
      background: #2e2e3e;
      border-left: 5px solid #ff3b3b;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <button id="btnEmergencia">
    🚨 Emergencia
    <div id="badge">0</div>
  </button>

  <div id="alertas"></div>

  <!-- Firebase App + Messaging -->
  <script type="module">
    // Importar Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT_ID.firebaseapp.com",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_PROJECT_ID.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID",
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // -------------------------------
    // Registrar token automáticamente
    // -------------------------------
    async function registrarToken() {
      try {
        const token = await getToken(messaging, { vapidKey: "TU_VAPID_KEY" });
        if (token) {
          console.log("Token registrado:", token);
          await fetch("https://TU_BACKEND.onrender.com/registrar-token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
          });
        }
      } catch (err) {
        console.error("Error registrando token:", err);
      }
    }
    registrarToken();

    // -------------------------------
    // Escuchar mensajes entrantes
    // -------------------------------
    const alertasContainer = document.getElementById("alertas");
    const badge = document.getElementById("badge");
    let contador = 0;

    onMessage(messaging, (payload) => {
      console.log("Mensaje recibido:", payload);
      contador++;
      badge.textContent = contador;

      const alertaDiv = document.createElement("div");
      alertaDiv.classList.add("alerta");
      alertaDiv.textContent = payload.notification.body;
      alertasContainer.prepend(alertaDiv);
    });

    // -------------------------------
    // Botón de emergencia
    // -------------------------------
    const btn = document.getElementById("btnEmergencia");
    btn.addEventListener("click", async () => {
      try {
        await fetch("https://TU_BACKEND.onrender.com/emergencia", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        });
        console.log("Alerta enviada al backend");
      } catch (err) {
        console.error("Error enviando alerta:", err);
      }
    });
  </script>
</body>
</html>
