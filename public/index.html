<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:20px;
}

.container{
padding:20px;
}

button{

width:90%;
max-width:400px;
padding:25px;
margin:12px;

font-size:22px;
font-weight:bold;

border:none;
border-radius:12px;

color:white;

transition:0.1s;

}

button:active{
transform:scale(0.95);
box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
}

.emergencia{
background:#ff0000;
}

.robo{
background:#ff8800;
}

.incendio{
background:#ff4444;
}

.asistencia{
background:#0066ff;
}

footer{

margin-top:30px;
padding:20px;

font-size:14px;
color:#ccc;

}

</style>

</head>

<body>

<h1>🚨 Villa Segura</h1>

<div class="container">

<button class="emergencia" onclick="enviarAlerta('EMERGENCIA')">
🚨 EMERGENCIA
</button>

<button class="robo" onclick="enviarAlerta('ROBO')">
🕵️ ROBO
</button>

<button class="incendio" onclick="enviarAlerta('INCENDIO')">
🔥 INCENDIO
</button>

<button class="asistencia" onclick="enviarAlerta('ASISTENCIA')">
🆘 ASISTENCIA
</button>

</div>

<footer id="footer">
Iniciando sistema...
</footer>

<script>

const firebaseConfig = {

apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
authDomain: "alerta-rosko.firebaseapp.com",
projectId: "alerta-rosko",
messagingSenderId: "1022811358317",
appId: "1:1022811358317:web:ce210848e7ed63d1412b64"

};

firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();

let tokenDispositivo = null;

async function iniciarSistema(){

const permiso = await Notification.requestPermission();

if(permiso !== "granted"){

document.getElementById("footer").innerText =
"Permiso de notificaciones denegado";

return;

}

const registroSW = await navigator.serviceWorker.register(
"/firebase-messaging-sw.js"
);

messaging.useServiceWorker(registroSW);

try{

tokenDispositivo = await messaging.getToken({
vapidKey:"BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw"
});

console.log("TOKEN:",tokenDispositivo);

document.getElementById("footer").innerText =
"Dispositivo conectado";

await fetch("/guardar-token",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
token:tokenDispositivo
})

});

}catch(error){

console.log(error);

document.getElementById("footer").innerText =
"Error obteniendo token";

}

}

iniciarSistema();

async function enviarAlerta(tipo){

document.getElementById("footer").innerText =
"Enviando alerta...";

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

await fetch("/alerta",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

tipo:tipo,
lat:lat,
lng:lng

})

});

document.getElementById("footer").innerText =
"Alerta " + tipo + " enviada 🚨";

});

}

</script>

</body>

</html>
