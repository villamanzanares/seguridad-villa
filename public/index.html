<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Segura</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { margin-bottom: 30px; }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      padding: 20px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .rojo { background: #dc2626; }
    .azul { background: #2563eb; }
    .verde { background: #16a34a; }
    .gris { background: #6b7280; }
  </style>
</head>

<body>
<h1>🚨 Villa Segura</h1>

<div class="botones">
  <button class="rojo" onclick="enviarAlerta('emergencia')">🚨 Emergencia</button>
  <button class="azul" onclick="enviarAlerta('sospechoso')">👀 Sospechoso</button>
  <button class="verde" onclick="enviarAlerta('info')">ℹ️ Información</button>
  <button class="gris" onclick="enviarAlerta('test', 'TestDevice')">🧪 Test flujo notificaciones</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
    authDomain: "alerta-rosko.firebaseapp.com",
    projectId: "alerta-rosko",
    storageBucket: "alerta-rosko.firebasestorage.app",
    messagingSenderId: "1022811358317",
    appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  async function init() {
    try {
      const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
      console.log("✅ Service Worker registrado");

      const permiso = await Notification.requestPermission();
      if (permiso !== "granted") { console.log("🔇 Notificaciones bloqueadas"); return; }

      const token = await getToken(messaging, {
        vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
        serviceWorkerRegistration: registration
      });

      console.log("📱 TOKEN:", token);

      await fetch("/guardar-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, nombre: "Dispositivo1" })
      });

    } catch (error) { console.error("❌ Error init:", error); }
  }

  init();

  window.enviarAlerta = async (tipo, dispositivo = "Desconocido") => {
    try {
      console.log(`⚡ Enviando alerta desde: ${dispositivo}`);

      const res = await fetch("/enviar-alerta", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tipo, dispositivo })
      });

      const data = await res.json();
      console.log("📡 Respuesta alerta:", data);

    } catch (error) { console.error("❌ Error enviando alerta:", error); }
  };
</script>
</body>
</html>
