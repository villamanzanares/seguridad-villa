<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Segura</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 15px;
      margin: 0;
      font-size: 22px;
      background: #020617;
    }

    .container {
      padding: 20px;
    }

    .botones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    button {
      padding: 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.97);
    }

    .emergencia { background: #dc2626; }
    .robo { background: #ea580c; }
    .incendio { background: #f59e0b; }
    .asistencia { background: #2563eb; }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #020617;
      padding: 10px;
      font-size: 14px;
    }

    .bloqueado {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <h1>🚨 Villa Segura</h1>

  <div class="container">

    <div class="botones">
      <button type="button" class="emergencia" onclick="enviarAlerta('EMERGENCIA')">🚨 Emergencia</button>
      <button type="button" class="robo" onclick="enviarAlerta('ROBO')">🚔 Robo</button>
      <button type="button" class="incendio" onclick="enviarAlerta('INCENDIO')">🔥 Incendio</button>
      <button type="button" class="asistencia" onclick="enviarAlerta('ASISTENCIA')">🆘 Asistencia</button>
    </div>

  </div>

  <div class="footer" id="estado">
    Listo para enviar alertas
  </div>

<script>
let enviando = false;

// 🔒 Bloquea/desbloquea UI
function bloquearUI(estado) {
  const botones = document.querySelectorAll('button');
  botones.forEach(btn => {
    btn.disabled = estado;
    btn.classList.toggle('bloqueado', estado);
  });
}

// 📢 Mensajes en footer
function mostrarEstado(msg) {
  document.getElementById('estado').innerText = msg;
}

// 📍 Obtener ubicación
function obtenerUbicacion() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject('GPS no soportado');
    } else {
      navigator.geolocation.getCurrentPosition(
        pos => resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        }),
        err => reject(err)
      );
    }
  });
}

// 🚀 Enviar alerta (ANTI FREEZE)
async function enviarAlerta(tipo) {
  if (enviando) return;

  enviando = true;
  bloquearUI(true);
  mostrarEstado('Enviando alerta...');

  try {
    let ubicacion = { lat: null, lng: null };

    try {
      ubicacion = await obtenerUbicacion();
    } catch (e) {
      console.warn('Sin GPS');
    }

    const res = await fetch('/alerta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tipo,
        lat: ubicacion.lat,
        lng: ubicacion.lng
      })
    });

    const data = await res.json();

    mostrarEstado(`Alerta ${tipo} enviada ✅`);

  } catch (error) {
    console.error(error);
    mostrarEstado('Error al enviar alerta ❌');
  }

  enviando = false;
  bloquearUI(false);
}
</script>

</body>
</html>
