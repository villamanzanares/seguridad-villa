<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
}

button {
  width: 90%;
  padding: 20px;
  margin: 10px;
  font-size: 20px;
  border-radius: 10px;
}

#footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  color: white;
  padding: 15px;
  font-size: 16px;
  text-align: center;
}
</style>
</head>

<body>

<h2>🚨 Villa Segura</h2>

<button onclick="enviar('EMERGENCIA')">🚨 EMERGENCIA</button>
<button onclick="enviar('ROBO')">🕵️ ROBO</button>
<button onclick="enviar('INCENDIO')">🔥 INCENDIO</button>
<button onclick="enviar('ASISTENCIA')">🆘 ASISTENCIA</button>

<div id="footer">Esperando alerta...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-messaging.js";

// 🔥 CONFIG (usa la tuya real)
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

// 📱 Registrar token
async function registrarToken() {
  try {
    const token = await getToken(messaging, {
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw"
    });

    await fetch("/registro-token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token })
    });

    console.log("✅ Token enviado al server");
  } catch (err) {
    console.error("❌ Error token:", err);
  }
}

registrarToken();

// 📩 Recibir alerta
onMessage(messaging, (payload) => {
  console.log("📩 Mensaje recibido:", payload);
  if (payload.data) recibirAlerta(payload.data);
});

// 🎯 Mostrar alerta
function recibirAlerta(data) {
  const footer = document.getElementById("footer");

  footer.innerHTML = `
    <div style="font-size:20px;"><b>🚨 Emergencia: ${data.tipo}</b></div>
    <div>Enviado por: ${data.nombre}</div>
    <div>Fono: ${data.telefono}</div>
    <div>${data.direccion} - ${data.villa}</div>
    <br>
    <button onclick="abrirMapa('${data.lat}','${data.lng}')">
      📍 Ver ubicación
    </button>
  `;
}

// 🗺️ Abrir mapa
window.abrirMapa = (lat, lng) => {
  window.open(`https://www.google.com/maps?q=${lat},${lng}`);
};

// 🚨 Enviar alerta
window.enviar = (tipo) => {
  navigator.geolocation.getCurrentPosition((pos) => {

    fetch("/enviar-alerta", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        tipo,
        nombre: "Juan García",
        telefono: "+5691234567",
        direccion: "Casa 12",
        villa: "Villa Segura",
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      })
    });

  });
};
</script>

</body>
</html>
