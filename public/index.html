<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin-top:60px;
  background:#f2f2f2;
}

button{
  font-size:24px;
  padding:20px 40px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
}

.emergency{background:red;color:white;}
.carabineros{background:green;color:white;}
.seguridad{background:orange;color:white;}

#status{
  margin-top:20px;
  font-size:14px;
  color:#333;
}
</style>

</head>
<body>

<h1>🚨 Villa Segura</h1>

<button class="emergency" onclick="enviarAlerta('EMERGENCIA')">
🚨 EMERGENCIA
</button>

<br>

<button class="carabineros" onclick="enviarAlerta('CARABINEROS')">
🚓 CARABINEROS
</button>

<br>

<button class="seguridad" onclick="enviarAlerta('SEGURIDAD')">
🛡 SEGURIDAD
</button>

<div id="status"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js";

/* -------------------------
   CONFIG FIREBASE
------------------------- */

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

const status = document.getElementById("status");

/* -------------------------
   REGISTRAR SERVICE WORKER
------------------------- */

async function iniciarNotificaciones(){

  try{

    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    console.log("✅ Service Worker registrado", registration);

    const permiso = await Notification.requestPermission();

    if(permiso !== "granted"){
      status.innerText = "⚠️ Permiso de notificaciones denegado";
      return;
    }

    const token = await getToken(messaging,{
      vapidKey:"BElEjemploVapidKey1234567890",
      serviceWorkerRegistration:registration
    });

    console.log("📱 Token:", token);

    status.innerText = "📱 Dispositivo registrado";

    /* enviar token al backend */

    await fetch("/registrar-token",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({token})
    });

  }catch(err){

    console.error("❌ Error registrando SW o generando token:",err);
    status.innerText = "❌ Error registrando notificaciones";

  }

}

iniciarNotificaciones();

/* -------------------------
   ENVIAR ALERTA
------------------------- */

async function enviarAlerta(tipo){

  try{

    const res = await fetch("/emergency",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        tipo,
        usuario:{
          nombre:"Vecino"
        }
      })

    });

    const data = await res.json();

    console.log("respuesta servidor",data);

    if(data.success){

      alert("🚨 Alerta enviada");

    }else{

      alert("Error enviando "+tipo+": "+data.error);

    }

  }catch(err){

    console.error(err);
    alert("Error enviando alerta");

  }

}

</script>

</body>
</html>
