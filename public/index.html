<h1 style="color:red;">🔥 VERSION NUEVA 🔥</h1>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Villa Segura</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 20px;
}

.logo {
  font-size: 40px;
}

.app {
  font-size: 26px;
  font-weight: bold;
}

.villa {
  font-size: 16px;
  opacity: 0.8;
}

/* BOTONES */
.container {
  padding: 20px;
}

button {
  width: 90%;
  max-width: 400px;
  margin: 10px auto;
  padding: 20px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  background: #ef4444;
  color: white;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  padding: 15px;
  font-weight: bold;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🚨</div>
  <div class="app">Villa Segura</div>
  <div class="villa" id="villaNombre">Villa Los Pinos</div>
</div>

<div class="container">
  <button onclick="enviar('Emergencia')">🚨 Emergencia</button>
  <button onclick="enviar('SOS')">🆘 SOS</button>
  <button onclick="enviar('Incendio')">🔥 Incendio</button>
  <button onclick="enviar('Robo')">🚔 Robo</button>
</div>

<div class="footer" id="info">
  Esperando alerta...
</div>

<script>

const usuario = {
  nombre: "Juan Carlos",
  direccion: "Av. Siempre Viva 123",
  telefono: "+56912345678",
  villa: "Villa Los Pinos"
};

function enviar(tipo) {

  fetch('/alerta', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ...usuario,
      tipo
    })
  });

}

/* CUANDO LLEGA ALERTA */
function mostrarAlerta(data) {
  document.getElementById("info").innerHTML =
    `${data.tipo} / ${data.nombre} / ${data.direccion} / ${data.telefono} / ${data.villa}`;
}

/* SIMULACIÓN (puedes borrar después) */
setTimeout(() => {
  mostrarAlerta({
    tipo: "Emergencia",
    nombre: "Juan Carlos",
    direccion: "Av. Siempre Viva 123",
    telefono: "+56912345678",
    villa: "Villa Los Pinos"
  });
}, 2000);

</script>

</body>
</html>
