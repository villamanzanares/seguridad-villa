<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Villa Segura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      padding: 20px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .robo { background: #ef4444; }
    .incendio { background: #f97316; }
    .asistencia { background: #3b82f6; }

    #alertas {
      margin-top: 30px;
      text-align: left;
    }

    .alerta {
      background: #1e293b;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🚨 Villa Segura</h1>

<div class="botones">
  <button class="robo" onclick="enviarAlerta('ROBO')">🚔 ROBO</button>
  <button class="incendio" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
  <button class="asistencia" onclick="enviarAlerta('ASISTENCIA')">🆘 ASISTENCIA</button>
</div>

<div id="alertas"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_DOMINIO",
    projectId: "alerta-rosko",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  // 🔑 REGISTRAR TOKEN
  async function registrarToken() {
    try {
      const token = await getToken(messaging, {
        vapidKey: "TU_VAPID_KEY"
      });

      console.log("📱 Token:", token);

      await fetch("/guardar-token", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token })
      });

    } catch (error) {
      console.error("❌ Error token:", error);
    }
  }

  registrarToken();

  // 🔔 ESCUCHAR MENSAJES EN PRIMER PLANO (CLAVE 🔥)
  onMessage(messaging, (payload) => {
    console.log("📩 Mensaje recibido:", payload);

    const tipo = payload.data?.tipo || "ALERTA";
    mostrarAlerta(tipo);
  });

  // 📡 ENVIAR ALERTA
  window.enviarAlerta = async (tipo) => {
    await fetch("/enviar-alerta", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ tipo })
    });
  };

  // 🧠 MOSTRAR ALERTA EN UI
  function mostrarAlerta(tipo) {
    const contenedor = document.getElementById("alertas");

    const div = document.createElement("div");
    div.className = "alerta";
    div.innerHTML = `🚨 Alerta: <strong>${tipo}</strong>`;

    contenedor.prepend(div);
  }
</script>

</body>
</html>
