<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura - Alertas Vecinales</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Roboto', sans-serif; margin:0; padding:0; background:linear-gradient(135deg,#f0f4f8,#d9e2ec); display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:100vh; color:#1f2937; }
  header { width:100%; padding:1rem 0; background-color:#0f172a; color:#fff; text-align:center; font-size:1.8rem; font-weight:700; box-shadow:0 2px 6px rgba(0,0,0,0.2); }
  main { margin-top:2rem; display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:1.2rem; width:90%; max-width:500px; }
  button { padding:1.5rem; font-size:1rem; font-weight:700; border:none; border-radius:12px; color:#fff; cursor:pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow:0 4px 8px rgba(0,0,0,0.15); }
  button:hover { transform: translateY(-3px); box-shadow:0 6px 12px rgba(0,0,0,0.2); }
  #btnEmergencia { background-color:#dc2626; }
  #btnRobo { background-color:#f59e0b; }
  #btnIncendio { background-color:#ef4444; }
  #btnAsistencia { background-color:#2563eb; }
  footer { margin-top:auto; padding:1rem 0; font-size:0.85rem; color:#64748b; }
</style>
</head>
<body>
  <header>Villa Segura 🚨</header>
  <main>
    <button id="btnEmergencia">EMERGENCIA</button>
    <button id="btnRobo">ROBO</button>
    <button id="btnIncendio">INCENDIO</button>
    <button id="btnAsistencia">ASISTENCIA</button>
  </main>
  <footer id="debug">Estado: listo | versión v3</footer>

<!-- Firebase JS con versionado para cache-busting -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=3"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js?v=3"></script>

<script>
const debug = document.getElementById('debug');

// Inicializar Firebase
firebase.initializeApp({
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
});;

const messaging = firebase.messaging();

// Solicitar permiso para notificaciones
messaging.requestPermission()
  .then(() => messaging.getToken())
  .then((token) => console.log('Token del dispositivo:', token))
  .catch((err) => console.error('Error obteniendo token:', err));

const sendAlert = async (type) => {
  debug.textContent = `Estado: obteniendo ubicación para ${type}...`;
  if (!navigator.geolocation) {
    alert('Geolocalización no soportada');
    debug.textContent = 'Estado: error, geolocalización no soportada';
    return;
  }

  navigator.geolocation.getCurrentPosition(async (position) => {
    const { latitude, longitude } = position.coords;
    debug.textContent = `Estado: enviando alerta ${type}...`;
    try {
      const res = await fetch('/send-alert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, latitude, longitude })
      });
      const data = await res.json();
      if (data.success) {
        debug.textContent = `✅ Alerta ${type} enviada correctamente (ID: ${data.messageId})`;
      } else {
        debug.textContent = `❌ Error al enviar alerta: ${data.error || data.message}`;
      }
    } catch (err) {
      console.error(err);
      debug.textContent = `❌ Error al enviar alerta: ${err.message}`;
    }
  }, (err) => {
    alert('Error obteniendo ubicación: ' + err.message);
    debug.textContent = '❌ Error obteniendo ubicación';
  });
};

document.getElementById('btnEmergencia').onclick = () => sendAlert('EMERGENCIA');
document.getElementById('btnRobo').onclick = () => sendAlert('ROBO');
document.getElementById('btnIncendio').onclick = () => sendAlert('INCENDIO');
document.getElementById('btnAsistencia').onclick = () => sendAlert('ASISTENCIA');

// Registrar Service Worker con versionado
if ('serviceWorker' in navigator) {
  const SW_VERSION = 'v3';
  navigator.serviceWorker.register(`firebase-messaging-sw.js?v=${SW_VERSION}`)
    .then(reg => console.log(`SW registrado con versión ${SW_VERSION}`, reg))
    .catch(err => console.error('Error registrando SW:', err));
}
</script>
</body>
</html>
