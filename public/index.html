<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Segura</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 15px;
      margin: 0;
      background: #020617;
    }

    .container {
      padding: 20px;
    }

    .botones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      padding: 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .emergencia { background: #dc2626; }
    .robo { background: #ea580c; }
    .incendio { background: #f59e0b; }
    .asistencia { background: #2563eb; }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #020617;
      padding: 10px;
      font-size: 14px;
    }

    .bloqueado {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>

<body>

<h1>🚨 Villa Segura</h1>

<div class="container">
  <div class="botones">
    <button type="button" class="emergencia" onclick="enviarAlerta('EMERGENCIA')">🚨 Emergencia</button>
    <button type="button" class="robo" onclick="enviarAlerta('ROBO')">🚔 Robo</button>
    <button type="button" class="incendio" onclick="enviarAlerta('INCENDIO')">🔥 Incendio</button>
    <button type="button" class="asistencia" onclick="enviarAlerta('ASISTENCIA')">🆘 Asistencia</button>
  </div>
</div>

<div class="footer" id="estado">Inicializando sistema...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

// 🧠 Registrar Service Worker SIN bloquear la app
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/firebase-messaging-sw.js')
    .then(() => console.log("SW registrado"))
    .catch(err => console.error("SW error:", err));
}

// 📲 Registrar token
async function registrarToken() {
  try {
    const token = await getToken(messaging, {
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw"
    });

    console.log("TOKEN:", token);

    document.getElementById('estado').innerText = "Notificaciones activas ✅";

    await fetch('/guardar-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });

  } catch (error) {
    console.error("Error token:", error);
    document.getElementById('estado').innerText = "Error notificaciones ❌ (ver consola)";
  }
}

registrarToken();

// 🚀 CONTROL UI
let enviando = false;

function bloquearUI(estado) {
  document.querySelectorAll('button').forEach(btn => {
    btn.disabled = estado;
    btn.classList.toggle('bloqueado', estado);
  });
}

// 🚨 ENVÍO ALERTA (VERSIÓN BLINDADA)
async function enviarAlerta(tipo) {
  if (enviando) return;

  enviando = true;
  bloquearUI(true);
  document.getElementById('estado').innerText = "Enviando alerta...";

  try {
    const res = await fetch('/alerta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo })
    });

    if (!res.ok) {
      throw new Error("Error servidor: " + res.status);
    }

    let data = {};
    try {
      data = await res.json();
    } catch {
      console.warn("Respuesta no es JSON");
    }

    document.getElementById('estado').innerText = `Alerta ${tipo} enviada ✅`;

  } catch (error) {
    console.error(error);
    document.getElementById('estado').innerText = "Error al enviar ❌";
  } finally {
    enviando = false;
    bloquearUI(false);
  }
}

// 👇 Hacer función accesible al HTML (IMPORTANTE)
window.enviarAlerta = enviarAlerta;

</script>

</body>
</html>
