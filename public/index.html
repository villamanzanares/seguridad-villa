<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alerta Vecinal</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #ff3b3b;
}

button {
  width: 90%;
  padding: 15px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #ff3b3b;
  color: white;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
</style>

</head>
<body>

<h1>🚨 ALERTA VECINAL</h1>

<input id="nombre" placeholder="Tu nombre">
<input id="telefono" placeholder="Teléfono">
<input id="ubicacion" placeholder="Ubicación">

<button onclick="enviarAlerta()">ENVIAR ALERTA</button>

<audio id="sirena" src="/sirena.mp3"></audio>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();

// 🔓 DESBLOQUEAR AUDIO
document.addEventListener("click", () => {
  const audio = document.getElementById("sirena");
  audio.play().then(() => {
    audio.pause();
    audio.currentTime = 0;
    console.log("🔊 Audio desbloqueado");
  }).catch(() => {});
}, { once: true });

// ===============================
// 📲 INICIALIZAR
// ===============================
async function init() {
  try {
    const permiso = await Notification.requestPermission();

    if (permiso !== "granted") {
      console.log("🔇 bloqueado");
      return;
    }

    const token = await messaging.getToken({
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw"
    });

    console.log("TOKEN:", token);

    // 🔥 GUARDAR TOKEN EN EL SERVER
    await fetch("/guardar-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token })
    });

  } catch (error) {
    console.error("❌ Error init:", error);
  }
}

init();

// ===============================
// 🚨 ENVIAR ALERTA
// ===============================
async function enviarAlerta() {
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const ubicacion = document.getElementById("ubicacion").value;

  try {
    const res = await fetch("/enviar-alerta", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        titulo: "🚨 EMERGENCIA",
        nombre,
        telefono,
        ubicacion
      })
    });

    const data = await res.json();
    console.log("RESPUESTA:", data);

  } catch (error) {
    console.error("❌ Error enviando alerta:", error);
  }
}

// ===============================
// 🔔 RECIBIR MENSAJES
// ===============================
messaging.onMessage((payload) => {
  console.log("📩 Mensaje recibido:", payload);

  const audio = document.getElementById("sirena");
  audio.play().catch(() => {
    console.log("🔇 bloqueado");
  });

  alert(
    payload.notification.title + "\n" +
    payload.notification.body
  );
});
</script>

</body>
</html>
