<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Segura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Villa Segura - Alertas Vecinales</h1>

  <div id="botones">
    <button class="alerta" data-tipo="EMERGENCIA">EMERGENCIA</button>
    <button class="alerta" data-tipo="ROBO">ROBO</button>
    <button class="alerta" data-tipo="INCENDIO">INCENDIO</button>
    <button class="alerta" data-tipo="ASISTENCIA">ASISTENCIA</button>
  </div>

  <footer id="footer">Estado: listo ✅</footer>

  <audio id="sirena" src="sirena.mp3"></audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-messaging.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    // 🔥 CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
      authDomain: "alerta-rosko.firebaseapp.com",
      projectId: "alerta-rosko",
      storageBucket: "alerta-rosko.firebasestorage.app",
      messagingSenderId: "1022811358317",
      appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);
    const db = getFirestore(app);

    const footer = document.getElementById("footer");
    const sirena = document.getElementById("sirena");

    // 🧠 DATOS DEL USUARIO (puedes cambiarlos después por login)
    const nombre = localStorage.getItem("nombre") || "Vecino";
    const telefono = localStorage.getItem("telefono") || "Sin teléfono";
    const direccion = localStorage.getItem("direccion") || "Sin dirección";

    // 🔔 SERVICE WORKER + TOKEN
    navigator.serviceWorker.register("/firebase-messaging-sw.js")
    .then(registration => {
      getToken(messaging, {
        vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
        serviceWorkerRegistration: registration
      }).then(token => {
        if (token) {
          fetch("/guardar-token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
          });
        }
      });
    });

    // 📲 MENSAJE EN PRIMER PLANO
    onMessage(messaging, (payload) => {
      console.log("Push recibido:", payload);
      sirena.play().catch(()=>{});
    });

    // 🚨 BOTONES
    document.querySelectorAll(".alerta").forEach(btn => {
      btn.addEventListener("click", async () => {
        const tipo = btn.dataset.tipo;

        try {
          await fetch("/enviar-alerta", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              tipo,
              nombre,
              telefono,
              direccion
            })
          });

          footer.textContent = `Alerta enviada: ${tipo} ✅`;

        } catch (err) {
          footer.textContent = "Error al enviar alerta ❌";
          console.error(err);
        }
      });
    });

    // 🔥 TIEMPO REAL (LA MAGIA)
    const q = query(
      collection(db, "alertas"),
      orderBy("timestamp", "desc"),
      limit(1)
    );

    onSnapshot(q, (snapshot) => {
      snapshot.forEach(doc => {
        const data = doc.data();

        footer.innerHTML = `
          🚨 ${data.tipo} <br>
          👤 ${data.nombre} <br>
          📞 ${data.telefono} <br>
          📍 ${data.direccion}
        `;

        sirena.play().catch(()=>{});
      });
    });

  </script>

</body>
</html>
