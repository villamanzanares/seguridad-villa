<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Villa Segura 🚨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 90%;
      max-width: 400px;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      display: block;
      width: 95%;
      max-width: 420px;
      margin: 10px auto;
      padding: 18px;
      font-size: 18px;
      border-radius: 14px;
      border: none;
      background: #ef4444;
      color: white;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    #debug {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }

    .banner {
      background: #22c55e;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <div class="banner">🧪 TEST VISUAL ACTIVO</div>

  <h1>🚨 Villa Segura</h1>

  <input id="nombre" placeholder="Tu nombre" />
  <input id="direccion" placeholder="Tu dirección" />

  <button onclick="enviarAlerta('Emergencia')">🚨 EMERGENCIA</button>
  <button onclick="enviarAlerta('SOS')">🆘 SOS</button>

  <div id="debug"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
      authDomain: "alerta-rosko.firebaseapp.com",
      projectId: "alerta-rosko",
      storageBucket: "alerta-rosko.firebasestorage.app",
      messagingSenderId: "1022811358317",
      appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    async function init() {
      try {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          alert("Permiso denegado");
          return;
        }

        const token = await messaging.getToken({
          vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw"
        });

        console.log("✅ Token:", token);

        await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

      } catch (err) {
        console.error("❌ Error init:", err);
      }
    }

    init();

    function enviarAlerta(tipo) {
      const nombre = document.getElementById("nombre").value.trim();
      const direccion = document.getElementById("direccion").value.trim();

      console.log("📤 Enviando alerta:", { nombre, direccion, tipo });

      fetch("/alerta", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          nombre,
          direccion,
          tipo
        })
      });
    }

    messaging.onMessage((payload) => {
      console.log("📩 Notificación recibida:", payload);

      const nombre = payload.data?.nombre || "Usuario";
      const direccion = payload.data?.direccion || "Ubicación no disponible";

      document.getElementById("debug").innerHTML =
        `🚨 ${nombre} - ${direccion}`;
    });
  </script>

</body>
</html>
