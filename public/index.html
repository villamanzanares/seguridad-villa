<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#footer-alerta {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 16px;
}

.alerta {
  font-weight: bold;
  color: #ff4444;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Villa Segura</h2>

<div id="footer-alerta">
  Esperando alertas...
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

// 🔔 Registrar Service Worker
navigator.serviceWorker.register("/firebase-messaging-sw.js")
.then((registration) => {

  getToken(messaging, {
    vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
    serviceWorkerRegistration: registration
  })
  .then((currentToken) => {
    if (currentToken) {
      console.log("Token:", currentToken);

      // enviar token a tu backend
      fetch("/guardar-token", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token: currentToken })
      });
    }
  });

});

// 🔥 ESCUCHA EN TIEMPO REAL (LA CLAVE DEL PROBLEMA)
const footer = document.getElementById("footer-alerta");

const q = query(
  collection(db, "alertas"),
  orderBy("timestamp", "desc"),
  limit(1)
);

onSnapshot(q, (snapshot) => {
  snapshot.forEach((doc) => {
    const data = doc.data();

    footer.innerHTML = `
      🚨 <span class="alerta">${data.tipo}</span><br>
      👤 ${data.nombre}<br>
      📍 ${data.direccion}
    `;
  });
});

// 📩 Mensaje en primer plano (opcional)
onMessage(messaging, (payload) => {
  console.log("Mensaje recibido:", payload);
});

</script>

</body>
</html>
