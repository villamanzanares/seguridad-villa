<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Villa Segura</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
width:90%;
padding:25px;
margin:10px;
font-size:22px;
border:none;
border-radius:10px;
}

.emergencia{background:red}
.robo{background:orange}
.incendio{background:#ff4444}
.asistencia{background:blue}

footer{
margin-top:30px;
font-size:14px;
color:#ccc
}

</style>

</head>

<body>

<h1>🚨 Villa Segura</h1>

<button class="emergencia" onclick="enviarAlerta('EMERGENCIA')">🚨 EMERGENCIA</button>
<button class="robo" onclick="enviarAlerta('ROBO')">🕵️ ROBO</button>
<button class="incendio" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
<button class="asistencia" onclick="enviarAlerta('ASISTENCIA')">🆘 ASISTENCIA</button>

<footer id="estado">Iniciando...</footer>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
authDomain: "alerta-rosko.firebaseapp.com",
projectId: "alerta-rosko",
messagingSenderId: "1022811358317",
appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();

navigator.serviceWorker.register('/firebase-messaging-sw.js')
.then((registration)=>{

messaging.useServiceWorker(registration);

})

async function iniciar(){

const permiso = await Notification.requestPermission();

if(permiso !== "granted"){
document.getElementById("estado").innerText="Permiso de notificación denegado";
return;
}

const token = await messaging.getToken({
vapidKey:"BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw"
});

console.log("TOKEN:",token);

document.getElementById("estado").innerText="Token registrado";

await fetch("/guardar-token",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({token})
});

}

iniciar();

async function enviarAlerta(tipo){

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

await fetch("/alerta",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
tipo,
lat,
lng
})
});

document.getElementById("estado").innerText="Alerta enviada 🚨";

});

}

</script>

</body>
</html>
