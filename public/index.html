<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura 🚨</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    background: #f0f3f5; 
    margin: 0; 
    padding: 3rem; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: flex-start;
    min-height: 100vh;
  }
  h1 { 
    color: #e74c3c; 
    text-align: center; 
    margin-bottom: 2rem; 
    font-size: 2rem;
  }

  /* Botones de alerta */
  .alert-button {
    width: 220px;
    padding: 1rem 0;
    font-size: 1.2rem;
    color: white;
    background-color: #e74c3c;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 0.5rem 0;
    transition: transform 0.1s ease-in-out, opacity 0.2s;
  }
  .alert-button:active { 
    animation: pulse 0.4s ease-out; 
  }
  @keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 rgba(231,76,60,0.7); }
    50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(231,76,60,0.7); }
    100% { transform: scale(1); box-shadow: 0 0 0 rgba(231,76,60,0); }
  }

  /* Botón Superusuario */
  .super-user-button {
    width: 180px;
    padding: 0.8rem 0;
    font-size: 1rem;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>

<h1>Villa Segura 🚨</h1>

<!-- Botones de alerta -->
<div style="display:flex; flex-direction:column; align-items:center;">
  <button class="alert-button" id="btnEmergencia" onclick="enviarAlerta('🚨 Emergencia', this)">🚨 Emergencia</button>
  <button class="alert-button" id="btnPrecaucion" onclick="enviarAlerta('⚠️ Precaución', this)">⚠️ Precaución</button>
</div>

<!-- Botón Superusuario -->
<button class="super-user-button" id="btnSuper" onclick="superUsuarioAction(this)">Super Usuario</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

<script>
  // ===== CONFIGURACIÓN FIREBASE PÚBLICA =====
  const firebaseConfig = {
    apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
    authDomain: "alerta-rosko.firebaseapp.com",
    projectId: "alerta-rosko",
    storageBucket: "alerta-rosko.firebasestorage.app",
    messagingSenderId: "1022811358317",
    appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
  };
  firebase.initializeApp(firebaseConfig);
  const messaging = firebase.messaging();

  // ===== USUARIO ACTUAL =====
  const currentUser = {
    nombre: "Juan Carlos",
    villa: "Villa Manzanares",
    token: null
  };

  // ===== REGISTRAR TOKEN EN BACKEND =====
  async function registrarToken() {
    try {
      const token = await messaging.getToken({ vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw" });
      if (!token) return console.warn("No se obtuvo token de Firebase");
      currentUser.token = token;
      await fetch("/guardar-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(currentUser)
      });
      console.log("✅ Token registrado en backend:", token);
    } catch (err) {
      console.error("❌ Error registrando token:", err);
    }
  }

  // ===== ENVIAR ALERTA CON BLOQUEO TEMPORAL DEL BOTÓN =====
  async function enviarAlerta(tipo, boton) {
    try {
      boton.disabled = true;
      boton.style.opacity = 0.6;

      console.log("📡 Enviando alerta:", tipo, "Usuario:", currentUser);
      const res = await fetch("/enviar-alerta", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tipo, usuario: currentUser })
      });
      const data = await res.json();
      console.log("✅ Respuesta backend:", data);

    } catch (err) {
      console.error("❌ Error enviando alerta:", err);
    } finally {
      boton.disabled = false;
      boton.style.opacity = 1;
    }
  }

  // ===== ACCIÓN SUPERUSUARIO CON BLOQUEO =====
  async function superUsuarioAction(boton) {
    try {
      boton.disabled = true;
      boton.style.opacity = 0.6;
      console.log("👑 Accion Superusuario ejecutada");
      await enviarAlerta("👑 Alerta Superusuario", boton);
    } finally {
      boton.disabled = false;
      boton.style.opacity = 1;
    }
  }

  // ===== ESCUCHAR NOTIFICACIONES EN TIEMPO REAL =====
  messaging.onMessage(payload => {
    console.log("📬 Notificación recibida:", payload);
    alert(`Nueva alerta: ${payload.notification.title} - ${payload.notification.body}`);
  });

  // ===== INICIALIZACIÓN =====
  registrarToken();
</script>
</body>
</html>
