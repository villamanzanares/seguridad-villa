<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<link rel="stylesheet" href="styles.css">

<link rel="icon" href="favicon.ico">

</head>

<body>

<div class="header">
<img src="icon.png" class="logo">
<h1>Villa Segura</h1>
</div>

<div class="botonera">

<button class="btn emergencia" onclick="enviarAlerta('EMERGENCIA')">
🚨 EMERGENCIA
</button>

<div class="fila">

<button class="btn ambulancia" onclick="enviarAlerta('AMBULANCIA')">
🚑 AMBULANCIA
</button>

<button class="btn bomberos" onclick="enviarAlerta('BOMBEROS')">
🚒 BOMBEROS
</button>

</div>

<button class="btn carabineros" onclick="enviarAlerta('CARABINEROS')">
👮 CARABINEROS
</button>

</div>

<div id="footer">
Sistema listo
</div>

<script>

async function enviarAlerta(tipo){

document.getElementById("footer").innerText =
"Enviando alerta " + tipo + "...";

try{

const res = await fetch("/alerta",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({ tipo })
});

const data = await res.json();

document.getElementById("footer").innerText =
"Alerta " + tipo + " enviada ✅";

}catch(e){

document.getElementById("footer").innerText =
"Error enviando alerta ❌";

}

}

</script>

</body>
</html>
