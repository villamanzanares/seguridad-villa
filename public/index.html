<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.ico">

</head>

<body>

<div class="header">
<img src="icon.png" class="logo">
<h1>Villa Segura</h1>
</div>

<div class="botonera">

<button class="btn emergencia" onclick="enviarAlerta('EMERGENCIA')">
🚨 EMERGENCIA
</button>

<div class="fila">

<button class="btn ambulancia" onclick="enviarAlerta('AMBULANCIA')">
🚑 AMBULANCIA
</button>

<button class="btn bomberos" onclick="enviarAlerta('BOMBEROS')">
🚒 BOMBEROS
</button>

</div>

<button class="btn carabineros" onclick="enviarAlerta('CARABINEROS')">
👮 CARABINEROS
</button>

</div>

<div id="footer">
Inicializando sistema...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

/* FOOTER INTELIGENTE */
function setFooter(msg){
  document.getElementById("footer").innerText = msg;
}

/* USUARIO LOCAL */
let usuario = localStorage.getItem("usuario");

if(!usuario){
  usuario = "Vecino-" + Math.floor(Math.random()*1000);
  localStorage.setItem("usuario", usuario);
}

/* SERVICE WORKER + TOKEN */
navigator.serviceWorker.register("/firebase-messaging-sw.js")
.then(async (registration) => {

  setFooter("Solicitando permisos...");

  const permission = await Notification.requestPermission();

  if(permission !== "granted"){
    setFooter("Permisos denegados ❌");
    return;
  }

  const token = await getToken(messaging, {
    vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
    serviceWorkerRegistration: registration
  });

  console.log("TOKEN:", token);

  await fetch("/subscribe",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ token })
  });

  setFooter("Sistema listo ✅");

});

/* MENSAJES EN FOREGROUND */
onMessage(messaging, (payload) => {

  console.log("Mensaje recibido:", payload);

  const titulo = payload.notification?.title || "ALERTA";
  const cuerpo = payload.notification?.body || "";

  setFooter("🚨 " + titulo + " - " + cuerpo);

});

/* ENVIAR ALERTA */
window.enviarAlerta = async function(tipo){

  setFooter("Enviando " + tipo + "...");

  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

  try{

    const res = await fetch("/alerta",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({ tipo, usuario })
    });

    await res.json();

    setFooter(tipo + " enviada ✅");

  }catch(e){

    setFooter("Error enviando alerta ❌");

  }

}

</script>

</body>
</html>
