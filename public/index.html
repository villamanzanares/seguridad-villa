<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura</title>
<style>
  body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin:0; padding:0; display:flex; flex-direction:column; min-height:100vh; }
  h1 { margin-bottom: 20px; text-align:center; }
  .hidden { display:none; }
  .form-container { background:#1e293b; padding:20px; border-radius:12px; margin:20px auto; width:90%; max-width:400px; }
  input, select { width:100%; padding:10px; margin:10px 0; border-radius:8px; border:none; }
  button { padding:15px; font-size:16px; border:none; border-radius:12px; cursor:pointer; margin-top:10px; width:100%; transition: transform 0.1s; }
  button:active { transform: scale(0.95); }
  .rojo { background:#dc2626; }
  .azul { background:#2563eb; }
  .verde { background:#16a34a; }
  .amarillo { background:#eab308; }
  .botones { display:flex; flex-direction:column; gap:15px; margin:20px 0; max-width:400px; margin:auto; }
  footer { background:#1e293b; text-align:center; padding:15px; margin-top:auto; font-size:14px; }
  .super-btn { position:fixed; bottom:20px; right:20px; padding:10px 15px; border-radius:50%; background:#fbbf24; font-weight:bold; cursor:pointer; z-index:1000; }
</style>
</head>
<body>

<h1>🚨 Villa Segura</h1>

<!-- FORMULARIO INSCRIPCION VECINO -->
<div id="formVecino" class="form-container">
  <h2>Registro Vecino</h2>
  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="telefono" placeholder="Teléfono">
  <input type="text" id="direccion" placeholder="Dirección">
  <input type="text" id="casaDepto" placeholder="Casa / Depto">
  <select id="villaSelect">
    <option value="">Selecciona Villa</option>
  </select>
  <button id="btnRegistrarVecino">Registrar y Entrar</button>
</div>

<!-- BOTONES ALERTA -->
<div id="appInterface" class="hidden">
  <div class="botones">
    <button class="rojo" onclick="enviarAlerta('EMERGENCIA')">🚨 EMERGENCIA</button>
    <button class="azul" onclick="enviarAlerta('SEGURIDAD')">🔒 SEGURIDAD</button>
    <button class="verde" onclick="enviarAlerta('AMBULANCIA')">🚑 AMBULANCIA</button>
    <button class="amarillo" onclick="enviarAlerta('BOMBEROS')">🔥 BOMBEROS</button>
  </div>
</div>

<!-- FOOTER -->
<footer id="footer">Datos del vecino aparecerán aquí</footer>

<!-- BOTON SUPER USUARIO -->
<button class="super-btn">S</button>

<!-- FORMULARIO SUPER USUARIO -->
<div id="superForm" class="form-container hidden">
  <h2>Agregar Villa (Super Usuario)</h2>
  <input type="password" id="claveSuper" placeholder="Clave Super Usuario">
  <input type="text" id="nuevaVilla" placeholder="Nombre de Villa">
  <button id="btnAgregarVilla">Agregar Villa</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

let usuarioLocal = null;

// =====================
// Cargar villas
// =====================
async function cargarVillas(){
  const res = await fetch("/villas");
  const data = await res.json();
  const select = document.getElementById("villaSelect");
  select.innerHTML = '<option value="">Selecciona Villa</option>';
  data.villas.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    select.appendChild(opt);
  });
}
cargarVillas();

// =====================
// REGISTRAR VECINO
// =====================
async function guardarVecino(){
  const nombre = document.getElementById("nombre").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const direccion = document.getElementById("direccion").value.trim();
  const casaDepto = document.getElementById("casaDepto").value.trim();
  const villa = document.getElementById("villaSelect").value;

  if(!nombre || !telefono || !direccion || !casaDepto || !villa){
    alert("Completa todos los campos"); return;
  }

  try{
    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
    const permiso = await Notification.requestPermission();
    if(permiso!=="granted"){ alert("Permiso de notificaciones rechazado"); return; }
    const token = await getToken(messaging,{vapidKey:"BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw", serviceWorkerRegistration:registration});
    usuarioLocal = { nombre, telefono, direccion, casaDepto, villa, token };

    await fetch("/guardar-token",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(usuarioLocal) });

    document.getElementById("formVecino").classList.add("hidden");
    document.getElementById("appInterface").classList.remove("hidden");
    actualizarFooter(usuarioLocal);
  }catch(e){ console.error(e); alert("Error registrando vecino"); }
}
document.getElementById("btnRegistrarVecino").addEventListener("click", guardarVecino);

// =====================
// ENVIAR ALERTA
// =====================
async function enviarAlerta(tipo){
  if(!usuarioLocal){ alert("Usuario no registrado"); return; }
  try{
    const res = await fetch("/enviar-alerta",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ tipo, usuario:usuarioLocal }) });
    const data = await res.json();
    if(data.ok){ actualizarFooter(usuarioLocal, tipo); }
  }catch(e){ console.error(e); }
}

// =====================
// FOOTER
// =====================
function actualizarFooter(usuario, tipo=""){
  const f = document.getElementById("footer");
  f.textContent = `Villa: ${usuario.villa} | Tipo: ${tipo} | Nombre: ${usuario.nombre} | Dirección: ${usuario.direccion} | Casa/Depto: ${usuario.casaDepto} | Tel: ${usuario.telefono}`;
}

// =====================
// SUPER USUARIO
// =====================
const SUPER_CLAVE = "villa2026";
document.querySelector(".super-btn").addEventListener("click", ()=>{ document.getElementById("superForm").classList.toggle("hidden"); });
document.getElementById("btnAgregarVilla").addEventListener("click", async ()=>{
  const clave = document.getElementById("claveSuper").value;
  const nombre = document.getElementById("nuevaVilla").value;
  if(clave!==SUPER_CLAVE){ alert("Clave incorrecta"); return; }
  if(!nombre){ alert("Nombre obligatorio"); return; }
  try{
    await fetch("/agregar-villa",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ nombre }) });
    alert("Villa agregada");
    document.getElementById("nuevaVilla").value=""; document.getElementById("claveSuper").value="";
    cargarVillas();
  }catch(e){ console.error(e); alert("Error agregando villa"); }
});
</script>
</body>
</html>
