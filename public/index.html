<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.ico">

</head>

<body>

<div class="header">
<img src="icon.png" class="logo">
<h1>Villa Segura</h1>
</div>

<div class="botonera">

<select id="ubicacion" class="ubicacion">
  <option value="Casa">📍 Casa</option>
  <option value="Portón">🚪 Portón</option>
  <option value="Plaza">🌳 Plaza</option>
  <option value="Calle">🛣 Calle</option>
</select>

<button class="btn emergencia" onclick="enviarAlerta('EMERGENCIA')">
🚨 EMERGENCIA
</button>

<div class="fila">

<button class="btn ambulancia" onclick="enviarAlerta('AMBULANCIA')">
🚑 AMBULANCIA
</button>

<button class="btn bomberos" onclick="enviarAlerta('BOMBEROS')">
🚒 BOMBEROS
</button>

</div>

<button class="btn carabineros" onclick="enviarAlerta('CARABINEROS')">
👮 CARABINEROS
</button>

</div>

<!-- HISTORIAL -->
<div id="historial"></div>

<!-- FOOTER IMPACTO -->
<div id="footer">
  <div id="alertaTipo">Sistema iniciando...</div>
  <div id="alertaUsuario"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

/* USUARIO */
let usuario = localStorage.getItem("usuario");

if(!usuario){
  usuario = prompt("Ingresa tu nombre o casa:");
  localStorage.setItem("usuario", usuario || "Vecino");
}

/* FOOTER */
function mostrarAlerta(tipo, usuarioTxt){
  document.getElementById("alertaTipo").innerText = "🚨 " + tipo;
  document.getElementById("alertaUsuario").innerText = usuarioTxt;
}

/* HISTORIAL UI */
function renderHistorial(lista){
  const cont = document.getElementById("historial");
  cont.innerHTML = "";

  lista.forEach(item => {
    const div = document.createElement("div");
    div.className = "itemHistorial";

    div.innerHTML = `
      <div class="tipo">${item.tipo}</div>
      <div class="detalle">${item.usuario} - ${item.ubicacion}</div>
      <div class="hora">${new Date(item.timestamp).toLocaleTimeString()}</div>
    `;

    cont.appendChild(div);
  });
}

/* BLOQUEO */
let bloqueado = false;

/* INIT */
navigator.serviceWorker.register("/firebase-messaging-sw.js")
.then(async (registration) => {

  const permission = await Notification.requestPermission();

  if(permission !== "granted"){
    mostrarAlerta("PERMISOS DENEGADOS", "");
    return;
  }

  const token = await getToken(messaging, {
    vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
    serviceWorkerRegistration: registration
  });

  await fetch("/subscribe",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ token })
  });

  cargarHistorial();

  mostrarAlerta("SISTEMA LISTO ✅", usuario);

});

/* RECIBIR */
onMessage(messaging, async (payload) => {

  const tipo = payload.notification?.title || "ALERTA";
  const cuerpo = payload.notification?.body || "";

  mostrarAlerta(tipo, cuerpo);

  cargarHistorial();

});

/* CARGAR HISTORIAL */
async function cargarHistorial(){
  try{
    const res = await fetch("/historial");
    const data = await res.json();
    renderHistorial(data);
  }catch(e){
    console.error("Error historial", e);
  }
}

/* ENVIAR */
window.enviarAlerta = async function(tipo){

  if(bloqueado) return;

  bloqueado = true;
  setTimeout(()=> bloqueado = false, 10000);

  const ubicacion = document.getElementById("ubicacion").value;

  mostrarAlerta("ENVIANDO...", usuario + " - " + ubicacion);

  try{

    await fetch("/alerta",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({ tipo, usuario, ubicacion })
    });

    mostrarAlerta(tipo + " ENVIADA", usuario + " - " + ubicacion);

    cargarHistorial();

  }catch(e){

    mostrarAlerta("ERROR ❌", "");

  }

}

</script>

</body>
</html>
