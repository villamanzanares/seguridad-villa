<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

button {
  width: 90%;
  padding: 15px;
  margin: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🚨 Villa Segura</h2>

<div style="text-align:center;">
  <button onclick="enviarAlerta('Emergencia')">Emergencia</button>
  <button onclick="enviarAlerta('Robo')">Robo</button>
</div>

<div id="footer">Esperando alertas...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

// 🔔 SERVICE WORKER
navigator.serviceWorker.register("/firebase-messaging-sw.js")
.then(registration => {
  getToken(messaging, {
    vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
    serviceWorkerRegistration: registration
  }).then(token => {
    if (token) {
      fetch("/guardar-token", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token })
      });
    }
  });
});

// 🚨 ENVIAR ALERTA
window.enviarAlerta = async (tipo) => {
  await fetch("/enviar-alerta", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      tipo,
      nombre: "Vecino",
      direccion: "Casa X"
    })
  });
};

// 🔥 TIEMPO REAL
const footer = document.getElementById("footer");

const q = query(
  collection(db, "alertas"),
  orderBy("timestamp", "desc"),
  limit(1)
);

onSnapshot(q, (snapshot) => {
  snapshot.forEach(doc => {
    const data = doc.data();

    footer.innerHTML = `
      🚨 ${data.tipo} <br>
      👤 ${data.nombre} <br>
      📍 ${data.direccion}
    `;
  });
});
</script>

</body>
</html>
