<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Villa Segura</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:60px;
background:#f2f2f2;
}

button{
font-size:24px;
padding:20px 40px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

.emergency{background:red;color:white;}
.carabineros{background:green;color:white;}
.seguridad{background:orange;color:white;}

</style>

</head>

<body>

<h1>🚨 Villa Segura</h1>

<button class="emergency" onclick="enviarAlerta('EMERGENCIA')">
🚨 EMERGENCIA
</button>

<br>

<button class="carabineros" onclick="enviarAlerta('CARABINEROS')">
🚓 CARABINEROS
</button>

<br>

<button class="seguridad" onclick="enviarAlerta('SEGURIDAD')">
🛡 SEGURIDAD
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getMessaging,getToken } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js";

const firebaseConfig={
apiKey:"AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
authDomain:"alerta-rosko.firebaseapp.com",
projectId:"alerta-rosko",
storageBucket:"alerta-rosko.firebasestorage.app",
messagingSenderId:"1022811358317",
appId:"1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app=initializeApp(firebaseConfig);
const messaging=getMessaging(app);

/* registrar service worker */

async function iniciar(){

try{

const registration=await navigator.serviceWorker.register("/firebase-messaging-sw.js");

console.log("✅ Service Worker registrado",registration);

const permiso=await Notification.requestPermission();

if(permiso!=="granted"){

alert("Debes permitir notificaciones");

return;

}

const token=await getToken(messaging,{
vapidKey:"TU_VAPID_KEY_AQUI",
serviceWorkerRegistration:registration
});

console.log("📱 Token:",token);

await fetch("/registrar-token",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({token})
});

}catch(err){

console.error("❌ Error:",err);

}

}

iniciar();

/* enviar alerta */

window.enviarAlerta=async function(tipo){

if(!navigator.geolocation){

alert("GPS no disponible");

return;

}

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const res=await fetch("/emergency",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
tipo,
lat,
lng
})

});

const data=await res.json();

if(data.success){

alert("🚨 Alerta enviada");

}else{

alert(data.error);

}

});

}

</script>

</body>

</html>
