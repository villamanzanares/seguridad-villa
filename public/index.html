<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Villa Segura</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
margin:0;
}

h1{
margin-top:10px;
}

button{
width:90%;
padding:18px;
margin:8px;
font-size:18px;
border:none;
border-radius:10px;
}

#mapa{
height:300px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>🚨 Villa Segura</h1>

<audio id="sirena" src="/sirena.mp3" preload="auto"></audio>

<button onclick="enviarAlerta('EMERGENCIA')" style="background:red;color:white;">
🚨 EMERGENCIA
</button>

<button onclick="enviarAlerta('ROBO')" style="background:orange;">
🚔 ROBO
</button>

<button onclick="enviarAlerta('INCENDIO')" style="background:#ff4500;color:white;">
🔥 INCENDIO
</button>

<button onclick="enviarAlerta('ASISTENCIA')" style="background:blue;color:white;">
🩺 ASISTENCIA
</button>

<div id="mapa"></div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
authDomain:"alerta-rosko.firebaseapp.com",
projectId:"alerta-rosko",
messagingSenderId:"1022811358317",
appId:"1:1022811358317:web:ce210848e7ed63d1412b64"

};

firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();


/* REGISTRAR SERVICE WORKER */

navigator.serviceWorker.register("/firebase-messaging-sw.js")
.then((registration)=>{

messaging.useServiceWorker(registration);

});


/* OBTENER TOKEN */

messaging.getToken({ vapidKey:"BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw" })
.then((token)=>{

fetch("/guardar-token",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ token })

});

});


/* MAPA */

const mapa = L.map('mapa').setView([-33.503,-70.601],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:"OSM"
}).addTo(mapa);


/* MOSTRAR ALERTA */

function mostrarAlerta(lat,lng,tipo){

const marker = L.marker([lat,lng]).addTo(mapa);

marker.bindPopup("🚨 "+tipo).openPopup();

mapa.setView([lat,lng],17);

}


/* ENVIAR ALERTA */

function enviarAlerta(tipo){

navigator.geolocation.getCurrentPosition((pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

fetch("/alerta",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({
tipo,
lat,
lng
})

});

});

}


/* RECIBIR MENSAJE SERVICE WORKER */

navigator.serviceWorker.addEventListener("message",(event)=>{

if(event.data.tipo==="alerta"){

const audio=document.getElementById("sirena");

audio.volume=1;
audio.play().catch(()=>{});

mostrarAlerta(event.data.lat,event.data.lng,event.data.tipo);

}

});

</script>

</body>
</html>
