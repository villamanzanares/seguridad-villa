<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura</title>

<style>
  body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
  h1 { margin-bottom: 20px; }
  .botones { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  button { padding: 16px; font-size: 18px; border-radius: 12px; border: none; cursor: pointer; }
  .rojo { background: #dc2626; }
  .azul { background: #2563eb; }
  .verde { background: #16a34a; }
  .amarillo { background: #facc15; }
  button.pulsando { transform: scale(1.1); box-shadow: 0 0 15px #facc15; transition: transform 0.1s, box-shadow 0.1s; }

  footer { margin-top: 20px; padding: 10px; background: #1e293b; border-radius: 12px; }
  .super-btn { position: fixed; bottom: 10px; right: 10px; font-size: 14px; padding: 6px 10px; }
  .hidden { display: none; }
  .form-container { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
  .form-container input, .form-container select { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 6px; border: none; }
</style>
</head>
<body>

<h1>🚨 Villa Segura</h1>

<!-- FORMULARIO INSCRIPCIÓN -->
<div id="formInscripcion" class="form-container">
  <h2>Registro de Vecino</h2>
  <input type="text" id="nombre" placeholder="Nombre" required>
  <input type="text" id="telefono" placeholder="Teléfono">
  <input type="text" id="direccion" placeholder="Dirección">
  <input type="text" id="casaDepto" placeholder="Casa / Depto">
  <select id="villa">
    <option value="">Selecciona Villa</option>
  </select>
  <button id="btnRegistrar">Registrar</button>
</div>

<!-- INTERFAZ APP -->
<div id="app" class="hidden">
  <div class="botones">
    <button class="rojo">🚨 Emergencia</button>
    <button class="azul">🛡 Seguridad</button>
    <button class="verde">🚑 Ambulancia</button>
    <button class="amarillo">🔥 Bomberos</button>
  </div>

  <footer id="footer">
    <div id="footerDatos">Aún no hay alertas</div>
  </footer>
</div>

<!-- BOTÓN SUPER USUARIO -->
<button class="super-btn">Super Usuario</button>

<div id="superForm" class="form-container hidden">
  <h2>Agregar Villa</h2>
  <input type="text" id="nuevaVilla" placeholder="Nombre de Villa">
  <button id="btnAgregarVilla">Agregar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

let usuario = null;

// Cargar villas
async function cargarVillas() {
  try {
    const res = await fetch("/villas");
    const data = await res.json();
    const select = document.getElementById("villa");
    select.innerHTML = `<option value="">Selecciona Villa</option>`;
    data.villas.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = v;
      select.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}

cargarVillas();

// Funciones principales
async function guardarVecino() {
  const btn = document.getElementById("btnRegistrar");
  btn.disabled = true; btn.textContent = "Registrando...";
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const direccion = document.getElementById("direccion").value;
  const casaDepto = document.getElementById("casaDepto").value;
  const villa = document.getElementById("villa").value;

  if (!nombre || !villa) { 
    alert("Nombre y Villa obligatorios");
    btn.disabled = false; btn.textContent = "Registrar";
    return;
  }

  try {
    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
    await navigator.serviceWorker.ready;
    const permiso = await Notification.requestPermission();
    if (permiso !== "granted") { 
      alert("Permiso de notificación denegado");
      btn.disabled = false; btn.textContent = "Registrar";
      return; 
    }

    let token = null;
    try {
      token = await getToken(messaging, {
        vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
        serviceWorkerRegistration: registration
      });
    } catch(e) {
      console.error("❌ No se pudo obtener token:", e);
      alert("No se pudo registrar notificaciones. Revisa permisos o SW.");
      btn.disabled = false; btn.textContent = "Registrar";
      return;
    }

    usuario = { nombre, telefono, direccion, casaDepto, villa, token };
    await fetch("/guardar-token", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(usuario) });

    document.getElementById("formInscripcion").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    actualizarFooter(usuario);

  } catch(e) { console.error(e); alert("Error al registrar usuario"); }
  finally { btn.disabled = false; btn.textContent = "Registrar"; }
}

async function enviarAlerta(tipo) {
  if (!usuario) return;
  usuario.tipo = tipo;
  try {
    const payload = { tipo, usuario };
    const res = await fetch("/enviar-alerta", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    const data = await res.json();
    console.log("📡 Alerta enviada:", data);
    actualizarFooter(usuario); // actualizar localmente al enviar
  } catch(e) { console.error(e); }
}

function actualizarFooter(datos) {
  const f = document.getElementById("footerDatos");
  f.textContent = `${datos.tipo || "ALERTA"} | ${datos.nombre} | ${datos.direccion} | ${datos.telefono} | ${datos.casaDepto || ""} | ${datos.villa}`;
  f.style.background = "#facc15"; // flash amarillo
  setTimeout(() => f.style.background = "#1e293b", 500);
}

function efectoPulso(btn) {
  btn.classList.add("pulsando");
  setTimeout(() => btn.classList.remove("pulsando"), 150);
}

function toggleSuperForm() {
  document.getElementById("superForm").classList.toggle("hidden");
}

async function agregarVilla() {
  const nombre = document.getElementById("nuevaVilla").value;
  if (!nombre) return alert("Nombre obligatorio");
  await fetch("/agregar-villa", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({nombre}) });
  alert("Villa agregada");
  document.getElementById("nuevaVilla").value = "";
  cargarVillas();
}

// ================================
// EVENT LISTENERS
document.getElementById("btnRegistrar").addEventListener("click", guardarVecino);
document.querySelector(".rojo").addEventListener("click", e => { efectoPulso(e.target); enviarAlerta("Emergencia"); });
document.querySelector(".azul").addEventListener("click", e => { efectoPulso(e.target); enviarAlerta("Seguridad"); });
document.querySelector(".verde").addEventListener("click", e => { efectoPulso(e.target); enviarAlerta("Ambulancia"); });
document.querySelector(".amarillo").addEventListener("click", e => { efectoPulso(e.target); enviarAlerta("Bomberos"); });
document.querySelector(".super-btn").addEventListener("click", toggleSuperForm);
document.getElementById("btnAgregarVilla").addEventListener("click", agregarVilla);

// Mensajes push en primer plano
onMessage(messaging, (payload) => { 
  console.log("📩 Alerta recibida:", payload.data); 
  actualizarFooter(payload.data); 
});
</script>
</body>
</html>
