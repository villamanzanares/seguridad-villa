<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Segura</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f9f9f9;
      min-height: 100vh;
    }

    #botones {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 0 10px;
      gap: 12px;
    }

    #botones .alerta {
      width: 90%;
      padding: 16px 0;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
    }

    [data-tipo="EMERGENCIA"] { background: #ff4d4f; }
    [data-tipo="ROBO"] { background: #faad14; }
    [data-tipo="INCENDIO"] { background: #f5222d; }
    [data-tipo="ASISTENCIA"] { background: #52c41a; }

    footer {
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Villa Segura - Alertas Vecinales</h1>

<div id="botones">
  <button class="alerta" data-tipo="EMERGENCIA">EMERGENCIA</button>
  <button class="alerta" data-tipo="ROBO">ROBO</button>
  <button class="alerta" data-tipo="INCENDIO">INCENDIO</button>
  <button class="alerta" data-tipo="ASISTENCIA">ASISTENCIA</button>
</div>

<footer id="footer">Inicializando...</footer>
<audio id="sirena" src="sirena.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-messaging.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

const footer = document.getElementById("footer");
const sirena = document.getElementById("sirena");

async function iniciar() {
  try {
    // ✅ REGISTRAR SERVICE WORKER
    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    // ✅ PEDIR PERMISO
    const permiso = await Notification.requestPermission();
    if (permiso !== "granted") {
      footer.textContent = "Permiso de notificaciones denegado ❌";
      return;
    }

    // ✅ OBTENER TOKEN
    const token = await getToken(messaging, {
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
      serviceWorkerRegistration: registration
    });

    if (token) {
      // ✅ GUARDAR TOKEN SIN DUPLICAR
      await setDoc(doc(db, "tokens", token), {
        token,
        fecha: new Date()
      });

      footer.textContent = "Conectado y listo 🔔";
    }

  } catch (err) {
    console.error(err);
    footer.textContent = "Error inicializando ❌";
  }
}

iniciar();

// 🔔 NOTIFICACIÓN EN PRIMER PLANO
onMessage(messaging, (payload) => {
  footer.textContent = `Alerta: ${payload.notification.title}`;
  sirena.play().catch(()=>{});
});

// 🚨 ENVÍO DE ALERTAS
document.querySelectorAll(".alerta").forEach(btn => {
  btn.addEventListener("click", async () => {
    const tipo = btn.dataset.tipo;

    try {
      const res = await fetch("/enviar-alerta", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tipo })
      });

      const data = await res.json();

      footer.textContent = `Alerta enviada: ${tipo} ✅ Enviada a: ${data.enviado}`;

    } catch (err) {
      footer.textContent = "Error enviando alerta ❌";
    }
  });
});
</script>

</body>
</html>
