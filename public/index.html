<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// Config de Firebase (tu proyecto)
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

// Pide permiso para notificaciones
async function initFCM(usuario) {
  try {
    const permission = await Notification.requestPermission();
    if(permission !== "granted") {
      console.log("Permiso de notificaciones denegado");
      return;
    }

    const token = await getToken(messaging, { vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw" });
    console.log("Token FCM:", token);

    // Guardar token en Firestore
    await setDoc(doc(db, "tokens", usuario), { token });

  } catch(err) {
    console.error("Error inicializando FCM:", err);
  }
}

// Escuchar mensajes mientras la app está abierta
onMessage(messaging, (payload) => {
  console.log("Mensaje recibido:", payload);
  mostrarAlertaEnFooter(payload.notification.title, payload.notification.body);
  reproducirSonido();
});

// Funciones auxiliares
function mostrarAlertaEnFooter(titulo, body) {
  const footer = document.getElementById("footer");
  footer.innerHTML = `<b>${titulo}</b><br>${body}`;
}

function reproducirSonido() {
  const sirena = new Audio('/sirena.mp3');
  sirena.play().catch(e => console.log("Error al reproducir sonido:", e));
}

// Inicializar FCM para un usuario
const usuario = "Usuario1"; // Cambiar según el usuario real
initFCM(usuario);
</script>
