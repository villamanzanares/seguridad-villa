<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Villa Segura</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:60px;
background:#f2f2f2;
}

button{
font-size:24px;
padding:20px 40px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

.emergency{background:red;color:white;}
.carabineros{background:green;color:white;}
.seguridad{background:orange;color:white;}

#debug{
position:fixed;
bottom:0;
left:0;
width:100%;
background:black;
color:#00ff9c;
font-size:12px;
padding:10px;
max-height:200px;
overflow:auto;
z-index:9999;
}

</style>

</head>

<body>

<h1>🚨 Villa Segura</h1>

<button class="emergency" onclick="enviarAlerta('EMERGENCIA')">
🚨 EMERGENCIA
</button>

<br>

<button class="carabineros" onclick="enviarAlerta('CARABINEROS')">
🚓 CARABINEROS
</button>

<br>

<button class="seguridad" onclick="enviarAlerta('SEGURIDAD')">
🛡 SEGURIDAD
</button>

<div id="debug">
DEBUG:
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getMessaging,getToken } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js";

const firebaseConfig={
apiKey:"AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
authDomain:"alerta-rosko.firebaseapp.com",
projectId:"alerta-rosko",
storageBucket:"alerta-rosko.firebasestorage.app",
messagingSenderId:"1022811358317",
appId:"1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app=initializeApp(firebaseConfig);
const messaging=getMessaging(app);

function logDebug(msg){

const box=document.getElementById("debug");

box.innerHTML+="<br>"+msg;

console.log(msg);

}

/* iniciar app */

async function iniciar(){

try{

logDebug("Iniciando app...");

const registration=await navigator.serviceWorker.register("/firebase-messaging-sw.js");

logDebug("Service Worker registrado");

const permiso=await Notification.requestPermission();

logDebug("Permiso notificaciones: "+permiso);

if(permiso!=="granted"){

alert("Debes permitir notificaciones");

return;

}

const token=await getToken(messaging,{
vapidKey:"BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
serviceWorkerRegistration:registration
});

logDebug("TOKEN: "+token);

await fetch("/registrar-token",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({token})

});

logDebug("Token enviado al servidor");

}catch(err){

logDebug("ERROR: "+err);

}

}

iniciar();

/* enviar alerta */

window.enviarAlerta=async function(tipo){

logDebug("Enviando alerta: "+tipo);

if(!navigator.geolocation){

alert("GPS no disponible");

return;

}

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

logDebug("GPS: "+lat+","+lng);

const res=await fetch("/emergency",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
tipo,
lat,
lng
})

});

const data=await res.json();

if(data.success){

alert("🚨 Alerta enviada");

logDebug("Alerta enviada correctamente");

}else{

alert(data.error);

logDebug("Error servidor");

}

});

}

</script>

</body>

</html>
