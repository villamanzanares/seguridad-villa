<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

header {
  background: #020617;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.btn {
  display: block;
  width: 90%;
  max-width: 400px;
  margin: 10px auto;
  padding: 20px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}

.robo { background: #dc2626; }
.emergencia { background: #ea580c; }
.sos { background: #2563eb; }
.test { background: #16a34a; }

footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  padding: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
🏡 VILLA SEGURA<br>
<span style="font-size:14px;">Alertas Vecinales</span>
</header>

<div class="container">
  <button class="btn robo" onclick="enviarAlerta('ROBO')">🚨 ROBO</button>
  <button class="btn emergencia" onclick="enviarAlerta('EMERGENCIA')">🔥 EMERGENCIA</button>
  <button class="btn sos" onclick="enviarAlerta('SOS')">🆘 SOS</button>
  <button class="btn test" onclick="enviarAlerta('TEST')">✅ TEST</button>
</div>

<footer id="footer">
Esperando alertas...
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

// 🔔 TOKEN
navigator.serviceWorker.register('/firebase-messaging-sw.js').then(async (reg) => {
  const token = await getToken(messaging, {
    vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
    serviceWorkerRegistration: reg
  });

  await fetch('/guardar-token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token })
  });
});

// 🚀 ENVIAR ALERTA
window.enviarAlerta = async (tipo) => {
  const datos = {
    tipo,
    nombre: "Vecino",
    telefono: "123456789",
    direccion: "Casa X",
    fecha: new Date()
  };

  await addDoc(collection(db, "alertas"), datos);

  await fetch('/enviar-alerta', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(datos)
  });
};

// 👁️ TIEMPO REAL (AQUÍ ESTABA EL PROBLEMA)
const q = query(collection(db, "alertas"), orderBy("fecha", "desc"), limit(1));

onSnapshot(q, (snapshot) => {
  snapshot.forEach((doc) => {
    const data = doc.data();

    document.getElementById("footer").innerHTML = `
      🚨 <b>${data.tipo}</b><br>
      👤 ${data.nombre}<br>
      📞 ${data.telefono}<br>
      📍 ${data.direccion}
    `;
  });
});

// 📩 MENSAJES EN PRIMER PLANO
onMessage(messaging, (payload) => {
  console.log("Mensaje recibido:", payload);
});
</script>

</body>
</html>
