<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
  }

  h1 { margin-bottom: 20px; }

  .botones {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  button {
    padding: 16px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
  }

  .rojo { background: #dc2626; }
  .azul { background: #2563eb; }
  .verde { background: #16a34a; }
  .amarillo { background: #facc15; }

  footer {
    margin-top: 20px;
    padding: 10px;
    background: #1e293b;
    border-radius: 12px;
  }

  .super-btn {
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-size: 14px;
    padding: 6px 10px;
  }

  .hidden { display: none; }
  .form-container { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
  .form-container input, .form-container select { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 6px; border: none; }
</style>
</head>
<body>

<h1>🚨 Villa Segura</h1>

<!-- FORMULARIO INSCRIPCIÓN -->
<div id="formInscripcion" class="form-container">
  <h2>Registro de Vecino</h2>
  <input type="text" id="nombre" placeholder="Nombre" required>
  <input type="text" id="telefono" placeholder="Teléfono">
  <input type="text" id="direccion" placeholder="Dirección">
  <input type="text" id="casaDepto" placeholder="Casa / Depto">
  <select id="villa">
    <option value="">Selecciona Villa</option>
  </select>
  <button onclick="guardarVecino()">Registrar</button>
</div>

<!-- INTERFAZ APP -->
<div id="app" class="hidden">
  <div class="botones">
    <button class="rojo" onclick="enviarAlerta('Emergencia')">🚨 Emergencia</button>
    <button class="azul" onclick="enviarAlerta('Seguridad')">🛡 Seguridad</button>
    <button class="verde" onclick="enviarAlerta('Ambulancia')">🚑 Ambulancia</button>
    <button class="amarillo" onclick="enviarAlerta('Bomberos')">🔥 Bomberos</button>
  </div>

  <footer id="footer">
    <div id="footerDatos">Aún no hay alertas</div>
  </footer>
</div>

<!-- BOTÓN SUPER USUARIO -->
<button class="super-btn" onclick="toggleSuperForm()">Super Usuario</button>

<div id="superForm" class="form-container hidden">
  <h2>Agregar Villa</h2>
  <input type="text" id="nuevaVilla" placeholder="Nombre de Villa">
  <button onclick="agregarVilla()">Agregar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

let usuario = null;

// Cargar villas para el select
async function cargarVillas() {
  const res = await fetch("/villas");
  const data = await res.json();
  const select = document.getElementById("villa");
  data.villas.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    select.appendChild(opt);
  });
}

cargarVillas();

// Guardar vecino + token
async function guardarVecino() {
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const direccion = document.getElementById("direccion").value;
  const casaDepto = document.getElementById("casaDepto").value;
  const villa = document.getElementById("villa").value;

  if (!nombre || !villa) return alert("Nombre y Villa obligatorios");

  try {
    // Registrar SW
    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
    const permiso = await Notification.requestPermission();
    if (permiso !== "granted") return alert("Permiso de notificación denegado");

    const token = await getToken(messaging, {
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
      serviceWorkerRegistration: registration
    });

    usuario = { nombre, telefono, direccion, casaDepto, villa, token };

    await fetch("/guardar-token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(usuario)
    });

    document.getElementById("formInscripcion").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    actualizarFooter(usuario);

    console.log("📱 Token guardado:", token);

  } catch(e) { console.error(e); }
}

// Enviar alerta
async function enviarAlerta(tipo) {
  if (!usuario) return;
  try {
    const res = await fetch("/enviar-alerta", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tipo, usuario })
    });
    const data = await res.json();
    console.log("📡 Alerta enviada:", data);
  } catch(e) { console.error(e); }
}

// Actualizar footer con datos de alerta
function actualizarFooter(datos) {
  const f = document.getElementById("footerDatos");
  f.textContent = `${datos.tipo || "ALERTA"} | ${datos.nombre} | ${datos.direccion} | ${datos.telefono} | ${datos.casaDepto} | ${datos.villa}`;
}

// Escuchar mensajes push mientras la app está abierta
onMessage(messaging, (payload) => {
  console.log("📩 Alerta recibida:", payload.data);
  actualizarFooter(payload.data);
});

// SUPER USUARIO
function toggleSuperForm() {
  document.getElementById("superForm").classList.toggle("hidden");
}

async function agregarVilla() {
  const nombre = document.getElementById("nuevaVilla").value;
  if (!nombre) return alert("Nombre obligatorio");
  await fetch("/agregar-villa", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nombre })
  });
  alert("Villa agregada");
  document.getElementById("nuevaVilla").value = "";
  cargarVillas();
}

</script>
</body>
</html>
