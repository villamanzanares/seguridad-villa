<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Segura</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 15px;
      margin: 0;
      background: #020617;
    }

    .container {
      padding: 20px;
    }

    .botones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      padding: 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .emergencia { background: #dc2626; }
    .robo { background: #ea580c; }
    .incendio { background: #f59e0b; }
    .asistencia { background: #2563eb; }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #020617;
      padding: 10px;
      font-size: 14px;
      text-align: left;
    }

    .bloqueado {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>

<body>

<h1>🚨 Villa Segura</h1>

<div class="container">
  <div class="botones">
    <button onclick="enviarAlerta('EMERGENCIA')" class="emergencia">🚨 Emergencia</button>
    <button onclick="enviarAlerta('ROBO')" class="robo">🚔 Robo</button>
    <button onclick="enviarAlerta('INCENDIO')" class="incendio">🔥 Incendio</button>
    <button onclick="enviarAlerta('ASISTENCIA')" class="asistencia">🆘 Asistencia</button>
  </div>
</div>

<div class="footer" id="estado">Inicializando sistema...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

// Registrar Service Worker
let swRegistration;
if ('serviceWorker' in navigator) {
  swRegistration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
  await navigator.serviceWorker.ready;
  console.log("SW listo ✅");
}

// Registrar token
async function registrarToken() {
  try {
    const token = await getToken(messaging, {
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
      serviceWorkerRegistration: swRegistration
    });

    if (token) {
      console.log("Token obtenido:", token);
      document.getElementById('estado').innerText = "Notificaciones activas ✅";

      await fetch('/guardar-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
    }

  } catch (e) {
    console.error(e);
    document.getElementById('estado').innerText = "Error notificaciones ❌";
  }
}

// Pedir permiso notificaciones
if (Notification.permission !== "granted") {
  Notification.requestPermission().then((perm) => {
    if (perm === 'granted') registrarToken();
  });
} else {
  registrarToken();
}

// Notificaciones en primer plano
onMessage(messaging, (payload) => {
  console.log('Mensaje recibido en foreground', payload);
  if (payload.notification) {
    new Notification(payload.notification.title, {
      body: payload.notification.body,
      icon: '/icon.png'
    });
  }
});

// Listener Firestore para actualizar footer en tiempo real
const q = query(collection(db, "alertas"), orderBy("timestamp", "desc"), limit(1));
onSnapshot(q, (snapshot) => {
  snapshot.docChanges().forEach(change => {
    if (change.type === "added") {
      const alerta = change.doc.data();
      const tipo = alerta.tipo || "Alerta";
      const nombre = alerta.nombre || "Desconocido";
      const direccion = alerta.direccion || "-";
      const telefono = alerta.telefono || "-";

      document.getElementById("estado").innerText =
        `🚨 ${tipo} enviada por ${nombre} (${direccion}, ${telefono})`;
    }
  });
});

// Funciones UI y enviar alerta
let enviando = false;
function bloquearUI(b) {
  document.querySelectorAll('button').forEach(btn => {
    btn.disabled = b;
    btn.classList.toggle('bloqueado', b);
  });
}

async function enviarAlerta(tipo) {
  if (enviando) return;

  enviando = true;
  bloquearUI(true);
  estado.innerText = "Enviando alerta...";

  try {
    // Datos del emisor (puedes poner dinámicos)
    const nombre = "Juan Pérez";
    const direccion = "Calle Falsa 123";
    const telefono = "+56912345678";

    const res = await fetch('/alerta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo, nombre, direccion, telefono })
    });

    if (!res.ok) throw new Error();
    estado.innerText = `Alerta ${tipo} enviada ✅`;

  } catch {
    estado.innerText = "Error al enviar ❌";
  } finally {
    enviando = false;
    bloquearUI(false);
  }
}

window.enviarAlerta = enviarAlerta;
</script>

</body>
</html>
