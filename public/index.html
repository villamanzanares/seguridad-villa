<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
width:90%;
max-width:400px;
padding:25px;
margin:12px;
font-size:22px;
border:none;
border-radius:10px;
color:white;
transition:0.1s;
}

button:active{
transform:scale(0.95);
}

.emergencia{background:red}
.robo{background:orange}
.incendio{background:#ff4444}
.asistencia{background:blue}

footer{
margin-top:20px;
color:#ccc;
}

</style>

</head>

<body>

<h1>🚨 Villa Segura</h1>

<button class="emergencia" onclick="enviarAlerta('EMERGENCIA')">🚨 EMERGENCIA</button>
<button class="robo" onclick="enviarAlerta('ROBO')">🕵️ ROBO</button>
<button class="incendio" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
<button class="asistencia" onclick="enviarAlerta('ASISTENCIA')">🆘 ASISTENCIA</button>

<footer id="estado">Iniciando...</footer>

<script>

const firebaseConfig = {

apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
authDomain: "alerta-rosko.firebaseapp.com",
projectId: "alerta-rosko",
messagingSenderId: "1022811358317",
appId: "1:1022811358317:web:ce210848e7ed63d1412b64"

};

firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();

async function iniciar(){

try{

const permiso = await Notification.requestPermission();

if(permiso !== "granted"){

document.getElementById("estado").innerText =
"Permiso de notificaciones denegado";

return;

}

const registroSW = await navigator.serviceWorker.register(
"/firebase-messaging-sw.js"
);

const token = await messaging.getToken({
  vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw"
});

vapidKey:"BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
serviceWorkerRegistration:registroSW

});

console.log("TOKEN:",token);

document.getElementById("estado").innerText =
"Dispositivo conectado";

await fetch("/guardar-token",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({token})

});

console.log("Token enviado al servidor");

}catch(error){

console.log(error);

document.getElementById("estado").innerText =
"Error registrando dispositivo";

}

}

iniciar();

async function enviarAlerta(tipo){

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

await fetch("/alerta",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

tipo:tipo,
lat:lat,
lng:lng

})

});

document.getElementById("estado").innerText =
"Alerta "+tipo+" enviada";

});

}

</script>

</body>
</html>
