<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="icon.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="icon.png" class="logo">
  <h1>Villa Segura</h1>
  <p class="sub">Sistema de Alertas Vecinales</p>
</div>

<!-- REGISTRO -->
<div id="registro" class="card">

  <h2>Registro de vecino</h2>

  <input id="nombre" placeholder="Nombre completo">
  <input id="telefono" placeholder="Teléfono">
  <input id="casa" placeholder="N° de casa">
  <input id="villa" placeholder="Villa / Sector">

  <button onclick="registrarUsuario()" class="btn guardar">
    Guardar y continuar
  </button>

</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="botonera">

    <button class="btn emergencia" onclick="enviarAlerta('EMERGENCIA')">
      🚨 EMERGENCIA
    </button>

    <div class="fila">
      <button class="btn ambulancia" onclick="enviarAlerta('AMBULANCIA')">
        🚑 AMBULANCIA
      </button>

      <button class="btn bomberos" onclick="enviarAlerta('BOMBEROS')">
        🚒 BOMBEROS
      </button>
    </div>

    <button class="btn carabineros" onclick="enviarAlerta('CARABINEROS')">
      👮 CARABINEROS
    </button>

  </div>

  <!-- HISTORIAL -->
  <div class="historial-box">
    <h3>📜 Alertas recientes</h3>
    <ul id="historial"></ul>
  </div>

</div>

<!-- FOOTER -->
<div id="footer">
  Inicializando sistema...
</div>

<script src="app.js"></script>

</body>
</html>
