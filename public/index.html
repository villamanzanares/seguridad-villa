<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Segura</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin: 0; font-family: sans-serif; }
  #map { width: 100%; height: 80vh; }
  .buttons { display: flex; justify-content: space-around; margin: 10px; }
  button { padding: 15px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  button:hover { transform: scale(1.1); }
  #footer { text-align: center; margin: 10px; }
</style>
</head>
<body>
<div id="map"></div>
<div class="buttons">
  <button onclick="enviarAlerta('EMERGENCIA')">EMERGENCIA</button>
  <button onclick="enviarAlerta('ROBO')">ROBO</button>
  <button onclick="enviarAlerta('INCENDIO')">INCENDIO</button>
  <button onclick="enviarAlerta('ASISTENCIA')">ASISTENCIA</button>
</div>
<div id="footer"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};
firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();
const db = firebase.firestore();

// Solicitar permiso y registrar token
messaging.requestPermission()
.then(() => messaging.getToken())
.then(token => {
  fetch("/guardar-token", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token })
  });
})
.catch(err => console.log("Token no disponible:", err));

// Sirena
const sirena = new Audio('sirena.mp3');
let listoParaSonar = false;

// Activar permiso de usuario para reproducir audio futuro
document.addEventListener('click', () => {
  listoParaSonar = true;
}, { once: true });

function reproducirAlerta() {
  if (!listoParaSonar) return;
  sirena.currentTime = 0;
  sirena.play().catch(err => console.log("Error reproduciendo sonido:", err));
}

// Mapa Leaflet
const map = L.map('map').setView([-33.45, -70.66], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const markers = [];

// Radar en tiempo real
db.collection("alerts").orderBy("createdAt").onSnapshot(snapshot => {
  snapshot.docChanges().forEach(change => {
    if (change.type === "added") {
      const alert = change.doc.data();
      const marker = L.marker([alert.lat, alert.lng]).addTo(map).bindPopup(alert.tipo);
      markers.push(marker);
      reproducirAlerta();
    }
  });
});

// FCM primer plano
messaging.onMessage(payload => {
  const { tipo, lat, lng } = payload.data;
  const marker = L.marker([lat, lng]).addTo(map).bindPopup(tipo);
  markers.push(marker);
  reproducirAlerta();
});

// Escuchar mensajes del Service Worker para sonar sirena al abrir notificación
navigator.serviceWorker.addEventListener('message', event => {
  if (event.data?.accion === 'sonarSirena') {
    listoParaSonar = true;
    reproducirAlerta();
  }
});

// Enviar alerta
function enviarAlerta(tipo) {
  if (!navigator.geolocation) return alert("GPS no disponible");
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    fetch("/alerta", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tipo, lat, lng })
    }).then(res => res.json())
      .then(data => {
        document.getElementById("footer").innerText = `Alerta ${tipo} enviada ✅`;
      });
  });
}
</script>
</body>
</html>
