<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa Segura</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f5f7fa;
      min-height: 100vh;
    }

    h1 { margin-bottom: 20px; }

    #botones {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 400px;
      gap: 15px;
    }

    .alerta {
      padding: 18px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
    }

    .EMERGENCIA { background: #ff4d4f; }
    .ROBO { background: #faad14; }
    .INCENDIO { background: #f5222d; }
    .ASISTENCIA { background: #52c41a; }

    footer {
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🚨 Villa Segura</h1>

<div id="botones">
  <button class="alerta EMERGENCIA" data-tipo="EMERGENCIA">EMERGENCIA</button>
  <button class="alerta ROBO" data-tipo="ROBO">ROBO</button>
  <button class="alerta INCENDIO" data-tipo="INCENDIO">INCENDIO</button>
  <button class="alerta ASISTENCIA" data-tipo="ASISTENCIA">ASISTENCIA</button>
</div>

<footer id="footer">Iniciando...</footer>

<audio id="sirena" src="sirena.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

const footer = document.getElementById("footer");
const sirena = document.getElementById("sirena");

// 🔥 Registrar Service Worker
async function registrarSW() {
  try {
    const reg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
    console.log("SW registrado ✅");
    return reg;
  } catch (err) {
    console.error("Error SW:", err);
  }
}

// 🔑 Registrar token CORRECTAMENTE
async function registrarToken() {
  try {
    const registration = await registrarSW();

    const token = await getToken(messaging, {
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
      serviceWorkerRegistration: registration
    });

    if (token) {
      await setDoc(doc(db, "tokens", token), {
        fecha: new Date()
      });

      footer.textContent = "Token registrado ✅";
    } else {
      footer.textContent = "No se obtuvo token ❌";
    }

  } catch (err) {
    console.error("Error token:", err);
    footer.textContent = "Error registrando token ❌";
  }
}

registrarToken();

// 📩 Mensajes en primer plano
onMessage(messaging, (payload) => {
  footer.textContent = `🚨 ${payload.notification.title}: ${payload.notification.body}`;
  sirena.play().catch(()=>{});
});

// 🚀 Enviar alerta
document.querySelectorAll(".alerta").forEach(btn => {
  btn.addEventListener("click", async () => {
    const tipo = btn.dataset.tipo;

    try {
      const res = await fetch("/enviar-alerta", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tipo })
      });

      const data = await res.json();

      footer.textContent = `Alerta enviada: ${tipo} ✅ / Enviada a: ${data.enviado}`;

    } catch (err) {
      footer.textContent = "Error enviando ❌";
      console.error(err);
    }
  });
});
</script>

</body>
</html>
