<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Villa Segura</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
margin-bottom:30px;
}

button{

width:90%;
max-width:400px;

padding:20px;

margin:10px;

font-size:20px;

border:none;

border-radius:10px;

cursor:pointer;

}

.emergencia{background:#ff0033;}
.robo{background:#ff7a00;}
.incendio{background:#ff0000;}
.asistencia{background:#0066ff;}

#debug{
margin-top:30px;
font-size:12px;
background:#000;
padding:10px;
text-align:left;
}

</style>

</head>

<body>

<h1>🚨 Villa Segura</h1>

<button class="emergencia" onclick="botonEmergencia()">
🚨 EMERGENCIA
</button>

<button class="robo" onclick="botonRobo()">
🚔 ROBO
</button>

<button class="incendio" onclick="botonIncendio()">
🔥 INCENDIO
</button>

<button class="asistencia" onclick="botonAsistencia()">
🆘 ASISTENCIA
</button>

<div id="debug"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging-compat.js"></script>

<script>

function log(txt){
document.getElementById("debug").innerHTML += txt + "<br>";
console.log(txt);
}

log("Iniciando app...");

const firebaseConfig = {

apiKey:"AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",

authDomain:"alerta-rosko.firebaseapp.com",

projectId:"alerta-rosko",

messagingSenderId:"1022811358317",

appId:"1:1022811358317:web:ce210848e7ed63d1412b64"

};

firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();

async function iniciar(){

const permiso = await Notification.requestPermission();

log("Permiso notificaciones: "+permiso);

if(permiso!=="granted") return;

const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

log("Service Worker registrado");

const token = await messaging.getToken({
serviceWorkerRegistration:registration
});

log("TOKEN: "+token);

await fetch("/guardar-token",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({token})

});

log("Token enviado al servidor");

}

iniciar();

async function enviarAlerta(tipo){

if(!navigator.geolocation){

alert("GPS no disponible");

return;

}

navigator.geolocation.getCurrentPosition(async pos=>{

const lat=pos.coords.latitude;

const lng=pos.coords.longitude;

log("Enviando alerta: "+tipo);

log("GPS: "+lat+","+lng);

await fetch("/alerta",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

tipo,

lat,

lng

})

});

log("Alerta enviada");

});

}

/* BOTONES */

function botonEmergencia(){

enviarAlerta("EMERGENCIA");

}

function botonRobo(){

enviarAlerta("ROBO");

window.location.href="tel:133";

}

function botonIncendio(){

enviarAlerta("INCENDIO");

window.location.href="tel:132";

}

function botonAsistencia(){

enviarAlerta("ASISTENCIA");

window.location.href="tel:131";

}

</script>

</body>

</html>
