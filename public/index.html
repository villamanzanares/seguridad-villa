<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALERTIA 999</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0B1F3A;
  color: white;
  text-align: center;
}

/* HEADER */
header {
  padding: 30px 20px 10px;
}

header img {
  width: 80px;
  margin-bottom: 10px;
}

.sub {
  font-size: 14px;
  opacity: 0.7;
}

.title {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* BOTONES */
.container {
  padding: 20px;
  margin-top: 10px;
}

.btn {
  display: block;
  width: 90%;
  max-width: 400px;
  margin: 12px auto;
  padding: 20px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.95);
}

.robo { background: #dc2626; }
.emergencia { background: #ea580c; }
.sos { background: #2563eb; }
.test { background: #16a34a; }

/* FOOTER */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #09162b;
  padding: 15px;
  font-size: 14px;
  line-height: 1.4;
}
</style>
</head>

<body>

<header>
  <!-- puedes agregar logo.png después -->
  <!-- <img src="logo.png"> -->
  <div class="sub">Alerta Vecinal</div>
  <div class="title">🚨 ALERTIA</div>
</header>

<div class="container">
  <button class="btn robo" onclick="enviarAlerta('ROBO')">🚨 ROBO</button>
  <button class="btn emergencia" onclick="enviarAlerta('EMERGENCIA')">🔥 EMERGENCIA</button>
  <button class="btn sos" onclick="enviarAlerta('SOS')">🆘 SOS</button>
  <button class="btn test" onclick="enviarAlerta('TEST')">✅ TEST</button>
</div>

<footer id="footer">
Esperando alertas...
</footer>

<!-- 🔊 SONIDO -->
<audio id="sirena" src="sirena.mp3" preload="auto"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
  authDomain: "alerta-rosko.firebaseapp.com",
  projectId: "alerta-rosko",
  storageBucket: "alerta-rosko.firebasestorage.app",
  messagingSenderId: "1022811358317",
  appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
const db = getFirestore(app);

const footer = document.getElementById("footer");
const sirena = document.getElementById("sirena");

// 🔔 TOKEN + SW
const registrarSWyToken = async () => {
  try {
    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

    // 🔥 CLAVE: esperar a que esté activo
    await navigator.serviceWorker.ready;

    const token = await getToken(messaging, {
      vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
      serviceWorkerRegistration: registration
    });

    if (token) {
      console.log("✅ TOKEN OK:", token);

      await fetch('/guardar-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
    } else {
      console.warn("⚠️ No se obtuvo token");
    }

  } catch (error) {
    console.error("❌ Error en SW/token:", error);
  }
};

registrarSWyToken();

// 🚀 ENVIAR ALERTA
window.enviarAlerta = async (tipo) => {
  const datos = {
    tipo,
    nombre: "Vecino",
    telefono: "123456789",
    direccion: "Casa X",
    fecha: new Date()
  };

  await addDoc(collection(db, "alertas"), datos);

  await fetch('/enviar-alerta', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(datos)
  });
};

// 👁️ TIEMPO REAL (🔥 CLAVE)
const q = query(collection(db, "alertas"), orderBy("fecha", "desc"), limit(1));

onSnapshot(q, (snapshot) => {
  snapshot.forEach((doc) => {
    const data = doc.data();

    footer.innerHTML = `
      🚨 <b>${data.tipo}</b><br>
      👤 ${data.nombre}<br>
      📞 ${data.telefono}<br>
      📍 ${data.direccion}
    `;

    // 🔊 SONIDO CUANDO CAMBIA ALERTA
    sirena.muted = false;
    sirena.currentTime = 0;

const playPromise = sirena.play();

if (playPromise !== undefined) {
  playPromise.catch(() => {
    console.log("🔇 Autoplay bloqueado por el navegador");
  });
}

// 📩 PUSH EN PRIMER PLANO
onMessage(messaging, (payload) => {
  console.log("Mensaje recibido:", payload);

  const data = payload.data || {};

  footer.innerHTML = `
    🚨 <b>${data.tipo || 'ALERTA'}</b><br>
    👤 ${data.nombre || 'Vecino'}<br>
    📞 ${data.telefono || 'Sin teléfono'}<br>
    📍 ${data.direccion || 'Sin dirección'}
  `;

  sirena.currentTime = 0;
  sirena.play().catch(()=>{});
});
</script>

</body>
</html>
