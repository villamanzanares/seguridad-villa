<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas Villa</title>

  <!-- Favicon vacío para evitar 404 -->
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f2f2f2; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .phone-mockup { width: 320px; max-width: 90vw; background: #fff; border-radius: 36px; border: 4px solid #000; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    header { height: 100px; display: flex; justify-content: center; align-items: center; font-size: 1.3em; font-weight: bold; }
    .btn-main { background: #d32f2f; color: #fff; border: none; height: 130px; width: 100%; border-radius: 12px 12px 0 0; font-size: 1.4em; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-bottom: 4px; }
    .row-middle { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .btn-square { background: #3949ab; color: #fff; border: none; height: 90px; width: 48%; font-size: 1em; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .btn-bottom { background: #00796b; color: #fff; border: none; height: 90px; width: 100%; border-radius: 0 0 12px 12px; font-size: 1em; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    footer { height: 120px; }
  </style>
</head>
<body>
  <div class="phone-mockup">
    <header>Villa Segura</header>

    <button class="btn-main" id="btn-emergencia">🚨 EMERGENCIA</button>

    <div class="row-middle">
      <button class="btn-square" id="btn-carabineros">Carabineros</button>
      <button class="btn-square" id="btn-seguridad">Seguridad Ciudadana</button>
    </div>

    <button class="btn-bottom" id="btn-estado">Estado</button>

    <footer></footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js";

    // 🔹 Configuración con tus datos
    const firebaseConfig = {
      apiKey: "AIzaSyDzKHOwWJIuC4_f2OMuoEyMxJnucC-jr5I",
      authDomain: "alerta-rosko.firebaseapp.com",
      projectId: "alerta-rosko",
      storageBucket: "alerta-rosko.firebasestorage.app",
      messagingSenderId: "1022811358317",
      appId: "1:1022811358317:web:ce210848e7ed63d1412b64"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    let fcmToken = null;

    async function registrarTokenEnBackend(token) {
      try {
        const res = await fetch("https://alertas-rosko.onrender.com/registrar-token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });
        const data = await res.json();
        console.log("✅ Token registrado en backend:", data);
      } catch (err) {
        console.error("❌ Error registrando token en backend:", err);
      }
    }

    // 🔹 Registrar Service Worker y obtener token FCM
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then(registration => getToken(messaging, {
          vapidKey: "BJdodl41DkUmiqBVuJ8AjALteBLa_YGsti0uynu6zKz0WGS13V3Rk5SB0rPyfEtmSpsJ_QUlZdzSH9shcVttofw",
          serviceWorkerRegistration: registration
        }))
        .then(token => {
          fcmToken = token;
          console.log("✅ Token generado:", token);
          registrarTokenEnBackend(token);
        })
        .catch(err => console.error("❌ Error registrando SW o generando token:", err));
    }

    const baseUrl = "https://alertas-rosko.onrender.com/emergencia";

    async function enviarAlerta(tipo) {
      const usuario = { nombre: "Juan Pérez", casa: "123", ubicacion: { lat: -33.45, lng: -70.66 } };
      try {
        const res = await fetch(baseUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario, token: fcmToken })
        });
        const data = await res.json();
        alert(data.success ? `✅ ${tipo} enviada correctamente` : `❌ Error enviando ${tipo}: ${data.error}`);
      } catch (err) {
        alert(`❌ Error enviando ${tipo}: ${err}`);
      }
    }

    // 🔹 Botones
    document.getElementById("btn-emergencia").addEventListener("click", () => enviarAlerta("EMERGENCIA"));
    document.getElementById("btn-carabineros").addEventListener("click", () => enviarAlerta("CARABINEROS"));
    document.getElementById("btn-seguridad").addEventListener("click", () => enviarAlerta("SEGURIDAD CIUDADANA"));
    document.getElementById("btn-estado").addEventListener("click", () => enviarAlerta("ESTADO"));

    // 🔹 Notificaciones mientras la página está abierta
    onMessage(messaging, (payload) => {
      console.log('📢 Mensaje recibido en foreground:', payload);

      const notificationTitle = payload.notification?.title || '🚨 Alerta';
      const notificationOptions = {
        body: payload.notification?.body || '¡Revisa la aplicación!',
        icon: '/favicon.ico',
        badge: '/favicon.ico',
        vibrate: [200, 100, 200],
        tag: 'alerta-unica',
        renotify: true
      };

      if (Notification.permission === 'granted') {
        new Notification(notificationTitle, notificationOptions);
      }

      const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
      audio.play();
    });
  </script>
</body>
</html>
