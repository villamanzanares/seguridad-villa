<!-- solo el select cambia -->
<select id="villa" required>
  <option value="">Cargando villas...</option>
</select>

<script type="module">
// ... código anterior arriba ...

// CARGAR VILLAS DESDE FIRESTORE
async function cargarVillas() {
  try {
    const res = await fetch("/villas");
    const data = await res.json();
    const select = document.getElementById("villa");
    select.innerHTML = '<option value="">Selecciona tu villa</option>';
    data.villas.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      select.appendChild(opt);
    });
  } catch (error) { console.error("❌ Error cargando villas:", error); }
}

cargarVillas();
</script>
