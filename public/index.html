<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villa Segura</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 10px;
}

.botones {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 15px;
}

button {
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.emergencia { background: red; color: white; }
.robo { background: orange; color: black; }
.incendio { background: darkred; color: white; }
.asistencia { background: green; color: white; }

#footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 15px;
  border-top: 2px solid red;
  font-size: 14px;
  line-height: 1.4;
}

.footer-contenido {
  max-width: 500px;
  margin: auto;
  text-align: center;
}

.alerta-titulo {
  font-size: 18px;
  font-weight: bold;
  color: #ff3b3b;
  margin-bottom: 5px;
}

.footer-btn {
  margin-top: 10px;
  padding: 10px;
  background: #2196F3;
  color: white;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>🚨 Villa Segura</h1>

<div class="botones">
  <button class="emergencia" onclick="enviarAlerta('EMERGENCIA')">🚨 EMERGENCIA</button>
  <button class="robo" onclick="enviarAlerta('ROBO')">🕵️ ROBO</button>
  <button class="incendio" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
  <button class="asistencia" onclick="enviarAlerta('ASISTENCIA')">🆘 ASISTENCIA</button>
</div>

<div id="footer">
  <div class="footer-contenido" id="footerContenido">
    Esperando alerta...
  </div>
</div>

<script>
let ultimaUbicacion = null;

// 🔊 sonido
const audio = new Audio('/sirena.mp3');

// 📍 obtener ubicación
function obtenerUbicacion() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const coords = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        };
        ultimaUbicacion = coords;
        resolve(coords);
      },
      (err) => reject(err)
    );
  });
}

// 🚀 enviar alerta
async function enviarAlerta(tipo) {
  try {
    const ubicacion = await obtenerUbicacion();

    const data = {
      tipo,
      lat: ubicacion.lat,
      lng: ubicacion.lng,
      nombre: "Juan García",
      telefono: "+5691234567",
      direccion: "Casa 12",
      villa: "Villa Segura"
    };

    const res = await fetch('/alerta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    actualizarFooter(data);

  } catch (error) {
    console.error(error);
  }
}

// 🧠 actualizar footer
function actualizarFooter(data) {
  document.getElementById("footerContenido").innerHTML = `
    <div class="alerta-titulo">🚨 Emergencia: ${data.tipo}</div>
    <div><b>Enviado por:</b> ${data.nombre}</div>
    <div><b>Fono:</b> ${data.telefono}</div>
    <div><b>Casa/Dpto:</b> ${data.direccion}</div>
    <div><b>Villa:</b> ${data.villa}</div>
    <button class="footer-btn" onclick="abrirMapa(${data.lat}, ${data.lng})">
      📍 Ver ubicación
    </button>
  `;
}

// 🗺 abrir mapa
function abrirMapa(lat, lng) {
  const url = `https://www.google.com/maps?q=${lat},${lng}`;
  window.open(url, '_blank');
}

// 🔔 recibir mensajes (cuando llegue push o simulado)
function recibirAlerta(data) {
  audio.play();

  actualizarFooter({
    tipo: data.tipo,
    nombre: data.nombre || "Vecino",
    telefono: data.telefono || "No disponible",
    direccion: data.direccion || "-",
    villa: data.villa || "-",
    lat: data.lat,
    lng: data.lng
  });
}
</script>

</body>
</html>
